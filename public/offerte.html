<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offerte bekijken</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px;line-height:1.6}
.action-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:2px solid #e2e8f0;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);flex-wrap:wrap}
.action-bar h2{font-size:16px;flex:1;font-weight:800;letter-spacing:-.3px}
.btn{padding:12px 28px;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn-accept{background:#10b981;color:#fff}.btn-reject{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px 100px}
.page{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px;overflow:hidden}
.hdr{padding:40px 36px;color:#fff;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px}
.hdr h1{font-size:32px;font-weight:900;letter-spacing:-1px}
.hdr-sub{font-size:14px;opacity:.8;margin-top:4px}
.hdr-num{font-family:'JetBrains Mono',monospace;font-size:15px;opacity:.9}
.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0;border-bottom:1px solid #e2e8f0}
.meta-item{padding:14px 20px;border-right:1px solid #e2e8f0}.meta-item:last-child{border-right:none}
.meta-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8}
.meta-val{font-size:15px;font-weight:700;margin-top:2px}
.parties{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:24px 36px;border-bottom:1px solid #e2e8f0}
.party-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:6px}
.party-name{font-weight:800;font-size:16px}.party-info{font-size:13px;color:#475569;line-height:1.7;margin-top:4px}
.party-mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:#64748b;margin-top:4px}
.grp-hdr{padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#fff}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;border-bottom:2px solid #e2e8f0;background:#f8fafc}
.tbl th.r,.tbl td.r{text-align:right}.tbl th.c,.tbl td.c{text-align:center}
.tbl td{padding:10px 14px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.grp-sub{display:flex;justify-content:flex-end;padding:8px 14px;background:#f8fafc;font-weight:700;font-size:13px;border-bottom:2px solid #e2e8f0}
.prod-card{display:flex;gap:16px;padding:20px 24px;border-bottom:1px solid #f1f5f9;align-items:flex-start}
.prod-img{width:80px;height:80px;border-radius:10px;object-fit:contain;background:#f8fafc;border:1px solid #e2e8f0;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.prod-img img{max-width:100%;max-height:100%;object-fit:contain}
.prod-body{flex:1}.prod-cat{display:inline-block;padding:2px 10px;border-radius:4px;font-size:10px;font-weight:700;color:#fff;margin-bottom:4px}
.prod-name{font-weight:800;font-size:16px;line-height:1.3}.prod-desc{font-size:13px;color:#64748b;margin-top:3px}
.prod-specs{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.spec-tag{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:2px 8px;font-size:11px;color:#475569}
.prod-price{flex-shrink:0;text-align:right}.prod-price-main{font-weight:800;font-size:18px;font-family:'JetBrains Mono',monospace}
.prod-price-sub{font-size:11px;color:#94a3b8}
.fiche-link{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;color:#2563eb;text-decoration:none;font-weight:600;font-size:12px;margin-top:6px}
.totals{padding:20px 36px}.tot-box{max-width:360px;margin-left:auto}
.tot-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:#475569}
.tot-row.last{padding:12px 16px;border-radius:8px;color:#fff;font-weight:800;font-size:17px;margin-top:8px}
.pay-box{margin:0 36px 20px;padding:14px 18px;background:#f1f5f9;border-radius:8px;font-size:13px}
.note-box{margin:0 36px 20px;padding:14px 18px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:13px}
.sign{margin:0 36px 24px;padding:20px;border:2px dashed #e2e8f0;border-radius:8px;text-align:center}
.sign-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8}
.footer{padding:14px 36px;color:#fff;display:flex;justify-content:space-between;font-size:12px;font-weight:500}
.bottom-cta{text-align:center;padding:40px 20px}
.bottom-cta h3{font-size:20px;margin-bottom:16px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:#fff;border-radius:16px;max-width:500px;width:95%;padding:32px;max-height:90vh;overflow-y:auto}
.fg{margin-bottom:16px}.fl{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
.fc{width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit}.fc:focus{outline:none;border-color:#2563eb}
.status-msg{text-align:center;padding:60px 20px}.status-msg .icon{font-size:64px;margin-bottom:16px}
@media(max-width:640px){.hdr{padding:24px 20px}.parties{grid-template-columns:1fr;gap:16px;padding:16px 20px}.prod-card{flex-wrap:wrap;padding:14px 16px}.totals,.pay-box,.note-box,.sign{padding-left:16px;padding-right:16px}.footer{flex-direction:column;gap:4px}.meta{grid-template-columns:1fr 1fr}.btn{padding:10px 16px;font-size:13px}}
</style>
</head>
<body>
<div id="app"><div class="status-msg"><div class="icon">⏳</div><h2>Offerte laden...</h2></div></div>
<script>
const SB_URL="https://qxnxbqkdvvblfkihmjxy.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bnhicWtkdnZibGZraWhtanh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTI3MTMsImV4cCI6MjA4ODkyODcxM30.1JDvrHgxLpU1GZqSjDVGtfnFJg8PHuD-aFpHOxAY1To";
const P=new URLSearchParams(location.search);const D=P.get('data');
const fE=n=>"€\u00A0"+Number(n||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
const fD=d=>d?new Date(d).toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit",year:"numeric"}):"—";
const fB=n=>{const c=(n||"").replace(/[^0-9]/g,"");return c.length>=9?"BE "+c.slice(0,4)+"."+c.slice(4,7)+"."+c.slice(7):(n||"")};
async function tV(id){try{const s=window.supabase.createClient(SB_URL,SB_KEY);await s.from('offerte_views').insert({offerte_id:id,viewed_at:new Date().toISOString(),user_agent:navigator.userAgent.slice(0,200)});}catch(e){}}
async function sR(id,st,d={}){
  try{
    const s=window.supabase.createClient(SB_URL,SB_KEY);
    // 1. Store in offerte_responses table
    await s.from('offerte_responses').insert({offerte_id:id,status:st,periode:d.periode||'',opmerkingen:d.opmerkingen||'',submitted_at:new Date().toISOString()});
    // 2. Also store in user_data so the app picks it up automatically
    // Find the offerte owner's data and update the offerte status
    const {data:rows}=await s.from('user_data').select('user_id,value').eq('key','b4_off');
    if(rows){
      for(const row of rows){
        try{
          const offs=JSON.parse(row.value);
          const idx=offs.findIndex(o=>o.id===id);
          if(idx>=0){
            offs[idx].status=st==='goedgekeurd'?'goedgekeurd':'afgewezen';
            offs[idx].klantReactie={status:st,periode:d.periode||'',opmerkingen:d.opmerkingen||'',datum:new Date().toISOString()};
            offs[idx].log=[...(offs[idx].log||[]),{ts:new Date().toISOString(),actie:st==='goedgekeurd'?'✅ Klant heeft goedgekeurd'+(d.periode?' — Periode: '+d.periode:''):'❌ Klant heeft afgewezen'+(d.opmerkingen?' — '+d.opmerkingen:'')}];
            await s.from('user_data').update({value:JSON.stringify(offs),updated_at:new Date().toISOString()}).eq('user_id',row.user_id).eq('key','b4_off');
            break;
          }
        }catch(_){}
      }
    }
  }catch(e){console.error('Response save error:',e);}
  // Show inline confirmation instead of redirect
  document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('active'));
  const app=document.getElementById('app');
  if(st==='goedgekeurd'){
    app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdf4,#ecfdf5)"><div style="background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:560px;width:95%;padding:48px 40px;text-align:center"><div style="font-size:80px;margin-bottom:20px">✅</div><h1 style="font-size:28px;color:#059669;margin-bottom:12px">Offerte goedgekeurd!</h1><p style="color:#475569;font-size:16px;line-height:1.6;margin-bottom:8px">Bedankt voor uw bevestiging. Wij nemen zo snel mogelijk contact met u op'+(d.periode?' voor een afspraak <strong>'+d.periode.toLowerCase()+'</strong>.':'.')+'</p>'+(d.opmerkingen?'<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-top:16px;font-size:14px;color:#166534;text-align:left"><strong>Uw opmerking:</strong> '+d.opmerkingen+'</div>':'')+'<p style="color:#94a3b8;font-size:13px;margin-top:24px">U kunt dit venster sluiten.</p></div></div>';
  }else{
    app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fef2f2,#fff1f2)"><div style="background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:560px;width:95%;padding:48px 40px;text-align:center"><div style="font-size:80px;margin-bottom:20px">📋</div><h1 style="font-size:28px;color:#dc2626;margin-bottom:12px">Offerte afgewezen</h1><p style="color:#475569;font-size:16px;line-height:1.6">Uw reactie is geregistreerd. Mocht u vragen hebben, neem gerust contact op.</p>'+(d.opmerkingen?'<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;margin-top:16px;font-size:14px;color:#991b1b;text-align:left"><strong>Uw opmerking:</strong> '+d.opmerkingen+'</div>':'')+'<p style="color:#94a3b8;font-size:13px;margin-top:24px">U kunt dit venster sluiten.</p></div></div>';
  }
}
function R(doc){const dc=doc._dc||'#1a2e4a';const b=doc._bed||{};const L=doc.lijnen||[];const G=doc.groepen||[];
const sub=L.reduce((s,l)=>s+(l.prijs*l.aantal),0);const bg={};L.forEach(l=>{const r=l.btw||21;if(!bg[r])bg[r]=0;bg[r]+=l.prijs*l.aantal*(r/100);});const btw=Object.values(bg).reduce((s,v)=>s+v,0);const tot=sub+btw;
const gr=[...G.map(g=>({...g,items:L.filter(l=>l.groepId===g.id)})).filter(g=>g.items.length>0)];const rest=L.filter(l=>!l.groepId||!G.find(g=>g.id===l.groepId));if(rest.length)gr.push({id:'r',naam:'Producten',items:rest});
const uP=[...new Map(L.filter(l=>l.naam).map(l=>[l.naam,l])).values()];
tV(doc.id);
document.getElementById('app').innerHTML=
'<div class="action-bar"><h2>📋 '+(doc.nummer||'Offerte')+' — '+(b.naam||'')+'</h2><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-accept" onclick="showA()">✅ Offerte goedkeuren</button><button class="btn btn-reject" onclick="showR()">❌ Afwijzen</button></div></div>'+
'<div class="wrap">'+
'<div class="page"><div class="hdr" style="background:'+dc+'"><div><div class="hdr-sub">'+(b.naam||'')+'</div><h1>OFFERTE</h1></div><div style="text-align:right"><div class="hdr-num">'+(doc.nummer||'')+'</div></div></div>'+
'<div class="meta"><div class="meta-item"><div class="meta-lbl">Datum</div><div class="meta-val">'+fD(doc.aangemaakt)+'</div></div><div class="meta-item"><div class="meta-lbl">Geldig tot</div><div class="meta-val">'+fD(doc.vervaldatum)+'</div></div><div class="meta-item"><div class="meta-lbl">Totaal incl. BTW</div><div class="meta-val" style="color:'+dc+';font-size:18px">'+fE(tot)+'</div></div></div>'+
'<div class="parties"><div><div class="party-lbl">Van</div><div class="party-name">'+(b.naam||'')+'</div><div class="party-info">'+(b.adres||'')+'<br>'+(b.gemeente||'')+'</div><div class="party-mono">'+fB(b.btwnr||'')+'<br>IBAN: '+(b.iban||'')+'</div></div><div><div class="party-lbl">Klant</div><div class="party-name">'+(doc.klant?.naam||'')+'</div>'+(doc.klant?.bedrijf?'<div style="font-weight:600;color:#475569">'+doc.klant.bedrijf+'</div>':'')+'<div class="party-info">'+(doc.klant?.adres||'')+'<br>'+(doc.klant?.gemeente||'')+'</div>'+(doc.klant?.btwnr?'<div class="party-mono">'+fB(doc.klant.btwnr)+'</div>':'')+(doc.klant?.tel?'<div class="party-info">'+doc.klant.tel+'</div>':'')+'</div></div>'+
gr.map(g=>'<div class="grp-hdr" style="background:'+dc+'">'+g.naam+'</div><table class="tbl"><thead><tr><th>Omschrijving</th><th>Eenh.</th><th class="c">Aantal</th><th class="r">Prijs excl.</th><th class="r">BTW</th><th class="r">Totaal</th></tr></thead><tbody>'+g.items.map(l=>'<tr><td><div style="font-weight:600">'+(l.naam||'')+'</div>'+(l.omschr?'<div style="font-size:12px;color:#64748b">'+l.omschr+'</div>':'')+'</td><td>'+(l.eenheid||'stuk')+'</td><td class="c">'+l.aantal+'</td><td class="r">'+fE(l.prijs)+'</td><td class="r">'+(l.btw||21)+'%</td><td class="r"><strong>'+fE(l.prijs*l.aantal)+'</strong></td></tr>').join('')+'</tbody></table><div class="grp-sub"><span>Subtotaal '+g.naam+':&nbsp;&nbsp;</span><strong>'+fE(g.items.reduce((s,l)=>s+l.prijs*l.aantal,0))+'</strong></div>').join('')+
'<div class="totals"><div class="tot-box"><div class="tot-row"><span>Subtotaal excl. BTW</span><span>'+fE(sub)+'</span></div>'+Object.entries(bg).map(([p,v])=>'<div class="tot-row"><span>BTW '+p+'%</span><span>'+fE(v)+'</span></div>').join('')+'<div class="tot-row last" style="background:'+dc+'"><span>TOTAAL incl. BTW</span><span>'+fE(tot)+'</span></div></div></div>'+
'<div class="pay-box"><strong>Betaling:</strong> IBAN '+(b.iban||'')+' · Mededeling: '+(doc.nummer||'')+'</div>'+
(doc.voorschot&&doc.voorschot!=="Geen voorschot"?'<div class="note-box">💡 <strong>Voorschot:</strong> '+doc.voorschot+' te betalen vóór aanvang.</div>':'')+
(doc.notities?'<div class="note-box">📝 <strong>Opmerking:</strong> '+doc.notities+'</div>':'')+
'<div class="sign"><div class="sign-lbl">Geldig voor akkoord — datum, handtekening & naam</div></div>'+
'<div class="footer" style="background:'+dc+'"><span><strong>'+(b.naam||'')+'</strong> · '+(b.adres||'')+', '+(b.gemeente||'')+'</span><span>BTW: '+fB(b.btwnr||'')+' · '+(b.website||'')+'</span></div></div>'+
'<div class="page"><div style="height:5px;background:'+dc+'"></div><div style="padding:24px 36px 12px"><h2 style="font-size:20px;color:'+dc+'">Productinformatie & Technische Fiches</h2><p style="font-size:13px;color:#64748b;margin-top:4px">Details van alle producten in deze offerte</p></div>'+
uP.map(l=>'<div class="prod-card"><div class="prod-img">'+(l.imageUrl&&!l.imageUrl.startsWith("data:")?"<img src=\""+l.imageUrl+"\" alt=\"\" onerror=\"this.parentElement.innerHTML='📦'\">":"<span style=\"font-size:32px\">📦</span>")+'</div><div class="prod-body"><div class="prod-cat" style="background:'+dc+'">'+(l.cat||'Product')+'</div><div class="prod-name">'+l.naam+'</div><div class="prod-desc">'+(l.omschr||'')+'</div>'+((l.specs||[]).length?'<div class="prod-specs">'+l.specs.map(s=>'<span class="spec-tag">✓ '+s+'</span>').join('')+'</div>':'')+((l.technischeFiches||[]).length?'<div style="margin-top:8px">'+l.technischeFiches.map(f=>'<span class="fiche-link">📎 '+f.naam+'</span>').join('')+'</div>':'')+'</div><div class="prod-price"><div class="prod-price-main" style="color:'+dc+'">'+fE(l.prijs)+'</div><div class="prod-price-sub">'+(l.btw||21)+'% BTW</div></div></div>').join('')+
'<div class="footer" style="background:'+dc+'"><span>'+(b.naam||'')+'</span><span>'+(doc.nummer||'')+'</span></div></div>'+
'<div class="page"><div class="bottom-cta"><h3>Uw beslissing over '+(doc.nummer||'deze offerte')+'</h3><p style="color:#64748b;margin-bottom:24px">Totaal: <strong style="color:'+dc+';font-size:20px">'+fE(tot)+'</strong></p><div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap"><button class="btn btn-accept" style="font-size:16px;padding:18px 48px" onclick="showA()">✅ Offerte goedkeuren</button><button class="btn btn-reject" style="font-size:16px;padding:18px 48px" onclick="showR()">❌ Offerte afwijzen</button></div></div></div>'+
'<div style="text-align:center;padding:24px;font-size:12px;color:#94a3b8">'+(b.naam||'')+' · '+(b.tel||'')+' · '+(b.email||'')+'</div></div>'+
'<div class="modal-bg" id="aM"><div class="modal"><h2 style="margin-bottom:20px;color:#10b981">✅ Offerte goedkeuren</h2><p style="margin-bottom:20px;color:#64748b">Bevestig uw akkoord met offerte <strong>'+doc.nummer+'</strong> voor <strong>'+fE(tot)+'</strong>.</p><div class="fg"><label class="fl">📅 Gewenste installatieperiode</label><select class="fc" id="aP"><option value="">— Kies —</option><option>Zo snel mogelijk</option><option>Binnen 2 weken</option><option>Binnen 1 maand</option><option>Binnen 2 maanden</option><option>Na overleg</option></select></div><div class="fg"><label class="fl">💬 Extra info</label><textarea class="fc" id="aN" rows="3" placeholder="Bijv: bij voorkeur ochtend..."></textarea></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn btn-reject" style="flex:1" onclick="cM()">Annuleren</button><button class="btn btn-accept" style="flex:1" onclick="dA()">✅ Bevestigen</button></div></div></div>'+
'<div class="modal-bg" id="rM"><div class="modal"><h2 style="margin-bottom:20px;color:#ef4444">❌ Afwijzen</h2><div class="fg"><label class="fl">Reden (optioneel)</label><textarea class="fc" id="rR" rows="3"></textarea></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn" style="flex:1;background:#f1f5f9;color:#64748b" onclick="cM()">Annuleren</button><button class="btn" style="flex:1;background:#ef4444;color:#fff" onclick="dR()">❌ Afwijzen</button></div></div></div>';}
window.showA=()=>document.getElementById('aM').classList.add('active');
window.showR=()=>document.getElementById('rM').classList.add('active');
window.cM=()=>document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('active'));
window.dA=()=>sR(window._offId,'goedgekeurd',{periode:document.getElementById('aP')?.value||'',opmerkingen:document.getElementById('aN')?.value||''});
window.dR=()=>sR(window._offId,'afgewezen',{opmerkingen:document.getElementById('rR')?.value||''});
if(D){try{const d=JSON.parse(decodeURIComponent(atob(D)));window._offId=d.id;R(d);}catch(e){document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">❌</div><h2>Ongeldige link</h2><p>'+e.message+'</p></div>';}}
else{document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">📋</div><h2>Geen offerte</h2><p>Gebruik de link uit uw email.</p></div>';}
</script>
</body>
</html>
