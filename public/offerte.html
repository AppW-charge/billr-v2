<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offerte laden...</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Arial,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
#loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px}
.spin{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#1a2e4a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#err{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:24px;text-align:center}
#err h2{color:#ef4444;font-size:20px;font-weight:800}
#err p{color:#64748b;font-size:14px;max-width:420px;line-height:1.6}
.retry-btn{background:#1a2e4a;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin-top:8px}
#app{display:none;max-width:920px;margin:0 auto;padding:20px 16px 80px}
.hdr{border-radius:12px;padding:26px 30px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;color:#fff}
.hdr-logo img{max-height:54px;max-width:150px;object-fit:contain}
.hdr-logo-txt{font-size:24px;font-weight:900;letter-spacing:-1px}
.hdr-right{text-align:right}
.hdr-right h1{font-size:21px;font-weight:800}
.hdr-right .nr{font-size:13px;opacity:.8;margin-top:2px}
.hdr-right .dtm{font-size:12px;opacity:.65;margin-top:4px}
.parties{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:560px){.parties{grid-template-columns:1fr}}
.party{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px}
.plbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:5px}
.pnm{font-weight:800;font-size:14px}
.pinf{font-size:12px;color:#475569;line-height:1.7;margin-top:3px}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.badge{background:#fff;border:1px solid #e2e8f0;border-radius:7px;padding:7px 13px;font-size:12px;color:#475569}
.badge strong{color:#1e293b;display:block;font-size:12.5px;font-weight:700}
.gtitel{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:9px 14px;border-radius:8px 8px 0 0;color:#fff;margin-top:14px}
.ltbl{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 8px 8px;border:1px solid #e2e8f0;border-top:none;margin-bottom:2px}
.ltbl th{background:#f8fafc;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#94a3b8;padding:8px 12px;text-align:left;border-bottom:1px solid #e2e8f0}
.ltbl td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.ltbl tr:last-child td{border-bottom:none}
.lnm{font-weight:600}
.lom{font-size:11.5px;color:#64748b;margin-top:2px}
.lpr{text-align:right;font-weight:600;white-space:nowrap}
.lct{text-align:center;color:#64748b;font-size:12.5px}
.lbtw{text-align:center;font-size:11px;color:#94a3b8}
.tots{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 20px;margin-top:20px;max-width:380px;margin-left:auto}
.tr{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#475569}
.tr.tot{border-top:2px solid #e2e8f0;padding-top:10px;margin-top:4px;font-weight:800;font-size:16px;color:#1e293b}
.sect{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 20px;margin-top:16px}
.stit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin-bottom:8px}
.stxt{font-size:12px;color:#64748b;line-height:1.7;white-space:pre-wrap}
/* Technische fiches sectie */
.fiches-sectie{margin-top:28px}
.fiches-sectie-titel{font-size:18px;font-weight:800;color:#1e293b;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.fiche-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:20px}
.fiche-card-header{padding:14px 18px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.fiche-card-naam{font-weight:700;font-size:14px;color:#1e293b}
.fiche-card-sub{font-size:12px;color:#64748b;margin-top:2px}
.fiche-embed-wrap{background:#f1f5f9;padding:0}
.fiche-embed{width:100%;border:none;display:block;min-height:600px}
@media(max-width:600px){.fiche-embed{min-height:400px}}
/* Bevestiging */
.bblok{border:2px solid var(--dc,#1a2e4a);border-radius:12px;padding:24px;margin-top:24px;text-align:center;background:#fff}
.bblok h3{font-size:17px;font-weight:800;margin-bottom:8px}
.bblok p{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6}
.btn-ok{background:var(--dc,#1a2e4a);color:#fff;border:none;padding:13px 36px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin:5px;display:inline-block}
.btn-nok{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;padding:11px 26px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin:5px}
.ok-banner{background:#d1fae5;border:2px solid #10b981;border-radius:10px;padding:18px 24px;text-align:center;margin-top:24px}
.ok-banner h3{color:#065f46;font-weight:800;font-size:18px;margin-bottom:4px}
.nok-banner{background:#fef2f2;border:2px solid #ef4444;border-radius:10px;padding:18px 24px;text-align:center;margin-top:24px}
.pform{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin-top:14px;text-align:left}
.pform label{font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px}
.pform input,.pform textarea{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;margin-bottom:10px;color:#1e293b}
.pform textarea{resize:vertical;min-height:70px}
.foot{text-align:center;margin-top:36px;font-size:11px;color:#94a3b8;padding-bottom:20px}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><div style="font-size:14px;font-weight:600;color:#64748b">Offerte laden...</div></div>
<div id="err"><h2>Offerte niet beschikbaar</h2><p id="errmsg">Deze offerte kon niet worden geladen.</p><button class="retry-btn" onclick="location.reload()">Opnieuw proberen</button></div>
<div id="app"></div>

<script>
var SB = "https://qxnxbqkdvvblfkihmjxy.supabase.co";
var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bnhicWtkdnZibGZraWhtanh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTI3MTMsImV4cCI6MjA4ODkyODcxM30.1JDvrHgxLpU1GZqSjDVGtfnFJg8PHuD-aFpHOxAY1To";
var params = new URLSearchParams(location.search);
var OID = params.get("id");
var ONR = params.get("nr");

// Alle fiches die inline getoond worden: {productId, naam, dataUri, productNaam}
var alleFiches = [];

function fmtE(n){return"\u20AC\u00A0"+Number(n||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");}
function fmtD(d){if(!d)return"\u2014";try{return new Date(d).toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit",year:"numeric"});}catch(_){return d;}}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hdr(){return{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json"};}

async function sbGet(path){
  var r=await fetch(SB+path,{headers:hdr()});
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
async function sbPost(path,body){
  var r=await fetch(SB+path,{method:"POST",headers:Object.assign({"Prefer":"return=minimal"},hdr()),body:JSON.stringify(body)});
  return r.ok||r.status===201;
}

function showErr(msg){
  document.getElementById("loader").style.display="none";
  document.getElementById("err").style.display="flex";
  if(msg)document.getElementById("errmsg").textContent=msg;
}

async function load(){
  if(!OID){showErr("Geen offerte-ID in de URL.");return;}

  // Laad offerte data (3 pogingen)
  var data=null;
  for(var i=1;i<=3;i++){
    try{
      var rows=await sbGet("/rest/v1/offerte_shares?id=eq."+encodeURIComponent(OID)+"&select=offerte_data,nummer");
      if(rows&&rows.length>0&&rows[0].offerte_data){data=rows[0].offerte_data;break;}
    }catch(e){console.warn("Poging "+i+":",e.message);}
    if(i<3)await new Promise(function(r){setTimeout(r,2000);});
  }
  if(!data){showErr("Offerte '"+(ONR||OID)+"' niet gevonden. Neem contact op met W-Charge BV.");return;}

  // Laad technische fiches uit offerte_fiches tabel
  var ficheMap = {}; // productId -> [{data, naam, type}]
  try{
    var frows=await sbGet("/rest/v1/offerte_fiches?offerte_id=eq."+encodeURIComponent(OID)+"&select=product_id,fiches");
    if(frows&&frows.length>0){
      frows.forEach(function(r){
        if(r.fiches&&r.fiches.length>0){
          ficheMap[r.product_id]=r.fiches.filter(function(f){return f.data&&f.data.length>100;});
        }
      });
    }
  }catch(e){console.warn("Fiches laden:",e.message);}

  // Verzamel alle fiches met productnaam voor de sectie onderaan
  // Loop over lijnen en koppel fiches aan productnaam
  (data.lijnen||[]).forEach(function(l){
    var pid=l.productId||l.id;
    var fiches=ficheMap[pid]||[];
    // Ook checken op fiches die rechtstreeks op de lijn staan (heeftData metadata)
    if(fiches.length===0 && (l.technischeFiches||[]).some(function(f){return f.data&&f.data.length>100;})){
      fiches=(l.technischeFiches||[]).filter(function(f){return f.data&&f.data.length>100;});
    }
    fiches.forEach(function(f){
      if(!f.data)return;
      var b64=f.data;
      if(b64.indexOf("base64,")>-1)b64=b64.split("base64,")[1];
      var mime=f.type||"application/pdf";
      alleFiches.push({
        productNaam: l.naam||"Product",
        naam: f.naam||"technische_fiche.pdf",
        dataUri: "data:"+mime+";base64,"+b64
      });
    });
  });

  render(data);

  // Registreer view (niet-blokkerend)
  try{sbPost("/rest/v1/offerte_views",{offerte_id:OID,user_agent:navigator.userAgent,viewed_at:new Date().toISOString()});}catch(_){}
}

function calcTot(lijnen){
  var sub=0,bm={};
  (lijnen||[]).forEach(function(l){
    if(l.type==="informatief")return;
    var lp=(l.prijs||0)*(l.aantal||1);sub+=lp;
    var r=l.btw||0;bm[r]=(bm[r]||0)+lp*r/100;
  });
  var tb=Object.values(bm).reduce(function(a,b){return a+b;},0);
  return{sub:sub,bm:bm,tot:sub+tb};
}

function lijnenHtml(lijnen,dc){
  var rows="";
  (lijnen||[]).forEach(function(l){
    if(l.type==="informatief"){
      rows+="<tr><td colspan='5' style='padding:8px 12px;font-size:12px;color:#64748b;background:#f8fafc;font-style:italic'>"+esc(l.naam||"")+"</td></tr>";
      return;
    }
    var sub=(l.prijs||0)*(l.aantal||1);
    rows+="<tr><td><div class='lnm'>"+esc(l.naam||"")+"</div>"+(l.omschr?"<div class='lom'>"+esc(l.omschr)+"</div>":"")+"</td><td class='lct'>"+esc(l.aantal||1)+"</td><td class='lbtw'>"+esc(l.btw||0)+"%</td><td class='lpr'>"+fmtE(l.prijs||0)+"</td><td class='lpr'>"+fmtE(sub)+"</td></tr>";
  });
  if(!rows)return"";
  return"<table class='ltbl'><thead><tr><th>Omschrijving</th><th style='text-align:center'>Aantal</th><th style='text-align:center'>BTW</th><th style='text-align:right'>E.prijs</th><th style='text-align:right'>Totaal</th></tr></thead><tbody>"+rows+"</tbody></table>";
}

function render(d){
  var bed=d._bed||{};
  var dc=d._dc||"#1a2e4a";
  var sj=d._sj||{};
  var tot=calcTot(d.lijnen||[]);
  var isOK=d.status==="goedgekeurd"||d.klantAkkoord;
  var isNOK=d.status==="afgewezen";

  document.title="Offerte "+(d.nummer||"")+"\u2014"+(bed.naam||"");
  document.documentElement.style.setProperty("--dc",dc);

  // Groepen
  var groepen=d.groepen||[];
  var lijnen=d.lijnen||[];
  var gHtml="";
  if(groepen.length>0){
    groepen.forEach(function(g){
      var gl=lijnen.filter(function(l){return l.groepId===g.id;});
      if(!gl.length)return;
      gHtml+="<div class='gtitel' style='background:"+esc(dc)+"'>"+esc(g.naam||"")+"</div>"+lijnenHtml(gl,dc);
    });
    var zg=lijnen.filter(function(l){return !l.groepId;});
    if(zg.length)gHtml+=lijnenHtml(zg,dc);
  } else {
    gHtml=lijnenHtml(lijnen,dc);
  }

  // BTW rijen
  var btwH="";
  Object.keys(tot.bm).forEach(function(pct){
    var b=tot.bm[pct];
    if(b>0.01)btwH+="<div class='tr'><span>BTW "+pct+"%</span><span>"+fmtE(b)+"</span></div>";
  });

  // Voorschot
  var vsH="";
  var vs=d.voorschot||d._voorschot||"";
  if(vs){var vsp=parseFloat(vs);if(!isNaN(vsp)&&vsp>0)vsH="<div class='tr' style='border-top:1px solid #f1f5f9;padding-top:8px;margin-top:4px'><span>Voorschot ("+esc(vs)+")</span><span>"+fmtE(tot.tot*vsp/100)+"</span></div>";}

  // Logo
  var logoH=bed.logo?"<img src='"+esc(bed.logo)+"' alt='"+esc(bed.naam||"")+"' style='max-height:54px;max-width:150px;object-fit:contain' onerror='this.style.display=`none`'/>":"<div class='hdr-logo-txt'>"+esc(bed.naam||"")+"</div>";

  // Technische fiches sectie — ALTIJD AUTOMATISCH ZICHTBAAR onderaan
  var fichesH="";
  if(alleFiches.length>0){
    fichesH="<div class='fiches-sectie'><div class='fiches-sectie-titel'>📎 Technische fiches</div>";
    alleFiches.forEach(function(f){
      fichesH+="<div class='fiche-card'>"
        +"<div class='fiche-card-header'><span style='font-size:18px'>📄</span><div><div class='fiche-card-naam'>"+esc(f.naam)+"</div><div class='fiche-card-sub'>"+esc(f.productNaam)+"</div></div></div>"
        +"<div class='fiche-embed-wrap'>"
        +"<embed class='fiche-embed' src='"+f.dataUri+"' type='application/pdf'/>"
        +"</div></div>";
    });
    fichesH+="</div>";
  }

  // Bevestigingsblok
  var bH="";
  if(sj.toonBevestigingslink!==false){
    if(isOK){bH="<div class='ok-banner'><h3>\u2705 Offerte goedgekeurd</h3><p style='color:#059669;font-size:13px;margin-top:4px'>Bedankt voor uw bevestiging. We nemen spoedig contact op voor de planning.</p></div>";}
    else if(isNOK){bH="<div class='nok-banner'><h3>Offerte afgewezen</h3><p style='font-size:13px;color:#991b1b;margin-top:4px'>We betreuren dit. Neem gerust contact op als u vragen heeft.</p></div>";}
    else{bH="<div class='bblok'><h3>Uw reactie</h3><p>Gaat u akkoord met deze offerte?</p><div id='actieblok'><button class='btn-ok' onclick='showPform()'>\u2705 Akkoord</button><button class='btn-nok' onclick='doAfwijzen()'>Niet akkoord</button></div><div id='pform' class='pform' style='display:none'><p style='font-size:13px;color:#475569;margin-bottom:14px'>Optioneel: voorkeursdatum voor de installatie</p><label>Gewenste datum (optioneel)</label><input type='date' id='pdatum'/><label>Opmerkingen (optioneel)</label><textarea id='pnotitie' placeholder='Bijv. speciale instructies, toegang...'></textarea><button class='btn-ok' style='width:100%;margin:0' onclick='doAkkoord()'>\u2705 Bevestigen</button></div></div>";}
  }

  var vwH=d._voorwaarden?"<div class='sect'><div class='stit'>Algemene voorwaarden</div><div class='stxt'>"+esc(d._voorwaarden)+"</div></div>":"";
  var notH=d.notities?"<div class='sect'><div class='stit'>Notities</div><div class='stxt'>"+esc(d.notities)+"</div></div>":"";

  var html=
    "<div class='hdr' style='background:"+esc(dc)+"'>"
      +"<div>"+logoH+"</div>"
      +"<div class='hdr-right'><h1>"+(sj.voorbladTitel||"Offerte")+"</h1><div class='nr'>"+esc(d.nummer||"")+"</div><div class='dtm'>"+fmtD(d.datum)+" &mdash; geldig t/m "+fmtD(d.vervaldatum)+"</div></div>"
    +"</div>"
    +"<div class='parties'>"
      +"<div class='party'><div class='plbl'>Van</div><div class='pnm'>"+esc(bed.naam||"")+"</div><div class='pinf'>"+esc(bed.adres||"")+(bed.gemeente?" &bull; "+esc(bed.gemeente):"")+"<br/>"+esc(bed.tel||"")+(bed.email?" &bull; "+esc(bed.email):"")+(bed.btwnr?"<br/>BTW: "+esc(bed.btwnr):"")+"</div></div>"
      +"<div class='party'><div class='plbl'>Voor</div><div class='pnm'>"+esc((d.klant&&d.klant.naam)||"")+"</div><div class='pinf'>"+esc((d.klant&&d.klant.adres)||"")+(d.klant&&d.klant.gemeente?" &bull; "+esc(d.klant.gemeente):"")+(d.klant&&d.klant.email?"<br/>"+esc(d.klant.email):"")+(d.klant&&d.klant.tel?" &bull; "+esc(d.klant.tel):"")+"</div></div>"
    +"</div>"
    +"<div class='meta-row'>"
      +"<div class='badge'><strong>Datum</strong>"+fmtD(d.datum)+"</div>"
      +"<div class='badge'><strong>Geldig tot</strong>"+fmtD(d.vervaldatum)+"</div>"
      +(d.btwRegime==="verlegd"?"<div class='badge'><strong>BTW</strong>Verlegd</div>":"")
    +"</div>"
    +gHtml
    +"<div class='tots'>"
      +"<div class='tr'><span>Subtotaal excl. BTW</span><span>"+fmtE(tot.sub)+"</span></div>"
      +btwH
      +"<div class='tr tot'><span>Totaal incl. BTW</span><span>"+fmtE(tot.tot)+"</span></div>"
      +vsH
    +"</div>"
    +notH
    +fichesH
    +vwH
    +bH
    +"<div class='foot'>"+esc(bed.naam||"")+(bed.btwnr?" &middot; BTW "+esc(bed.btwnr):"")+(bed.iban?" &middot; "+esc(bed.iban):"")+(bed.tel?" &middot; "+esc(bed.tel):"")+(bed.email?" &middot; "+esc(bed.email):"")+"</div>";

  document.getElementById("app").innerHTML=html;
  document.getElementById("app").style.display="block";
  document.getElementById("loader").style.display="none";
}

function showPform(){
  document.getElementById("pform").style.display="block";
  document.getElementById("actieblok").style.display="none";
}
async function doAkkoord(){
  var datum=document.getElementById("pdatum").value||"";
  var notitie=document.getElementById("pnotitie").value||"";
  try{
    await sbPost("/rest/v1/offerte_responses",{offerte_id:OID,status:"goedgekeurd",periode:datum||null,opmerkingen:notitie||null,submitted_at:new Date().toISOString()});
    document.querySelector(".bblok").outerHTML="<div class='ok-banner'><h3>\u2705 Offerte goedgekeurd!</h3><p style='color:#059669;font-size:13px;margin-top:4px'>Bedankt"+(datum?" &mdash; voorkeursdatum: "+datum:"")+". We nemen spoedig contact op.</p></div>";
  }catch(e){alert("Er ging iets mis. Probeer opnieuw of bel ons direct.");}
}
async function doAfwijzen(){
  if(!confirm("Bent u zeker dat u deze offerte wilt afwijzen?"))return;
  try{
    await sbPost("/rest/v1/offerte_responses",{offerte_id:OID,status:"afgewezen",submitted_at:new Date().toISOString()});
    document.querySelector(".bblok").outerHTML="<div class='nok-banner'><h3>Offerte afgewezen</h3><p style='font-size:13px;color:#991b1b;margin-top:4px'>Bedankt voor uw reactie. Neem gerust contact op.</p></div>";
  }catch(e){alert("Er ging iets mis.");}
}

load();
</script>
</body>
</html>
