<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offerte bekijken</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f1f5f9;min-height:100vh}
#spin{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px}
.sp{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
#err{display:none;max-width:500px;margin:80px auto;background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.1);padding:48px 32px;text-align:center}
#err .ico{font-size:52px;margin-bottom:16px}
#err h2{font-size:20px;font-weight:800;color:#1e293b;margin-bottom:8px}
#err p{font-size:13px;color:#64748b;line-height:1.7}
#frame-wrap{display:none}
#topbar{background:#1e293b;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:999}
#topbar strong{color:#fff;font-size:13px}
#topbar button{background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600}
#topbar .tip{color:rgba(255,255,255,.5);font-size:11px}
#akbalk{background:#fff;border-top:2px solid #e2e8f0;padding:14px 20px;display:none;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;position:sticky;bottom:0;z-index:998}
#akbalk p{font-size:13px;color:#64748b}
.abtn{padding:12px 24px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.aok{background:#10b981;color:#fff}
.aaf{background:#f1f5f9;color:#64748b;border:2px solid #e2e8f0}
.abtn:disabled{opacity:.5;cursor:not-allowed}
iframe{width:100%;border:none;display:block}
@media print{#topbar,#akbalk{display:none!important}}
</style>
</head>
<body>
<div id="spin"><div class="sp"></div><p style="color:#64748b;font-size:13px">Laden...</p></div>
<div id="err"><div class="ico" id="eico">❌</div><h2 id="eh">Niet beschikbaar</h2><p id="ep"></p></div>
<div id="frame-wrap">
  <div id="topbar">
    <strong id="docnr">Document</strong>
    <button id="printbtn">🖨 Afdrukken / PDF</button>
    <span class="tip">Kies "Opslaan als PDF"</span>
  </div>
  <iframe id="docframe"></iframe>
  <div id="akbalk">
    <p>Gaat u akkoord met deze offerte?</p>
    <button class="abtn aok" id="bok">✅ Ik ga akkoord</button>
    <button class="abtn aaf" id="baf">❌ Niet akkoord</button>
  </div>
</div>

<script>
var SB="https://qxnxbqkdvvblfkihmjxy.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bnhicWtkdnZibGZraWhtanh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTI3MTMsImV4cCI6MjA4ODkyODcxM30.1JDvrHgxLpU1GZqSjDVGtfnFJg8PHuD-aFpHOxAY1To";
var params=new URLSearchParams(location.search), oid=params.get("id");

function showErr(ico,h,p){
  document.getElementById("spin").style.display="none";
  document.getElementById("err").style.display="block";
  document.getElementById("eico").textContent=ico;
  document.getElementById("eh").textContent=h;
  document.getElementById("ep").innerHTML=p;
}

async function go(){
  if(!oid){showErr("❌","Ongeldige link","Geen document ID.");return;}
  try{
    // Laad offerte data
    var r=await fetch(SB+"/rest/v1/offerte_shares?id=eq."+oid+"&select=offerte_data",
      {headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}});
    var rows=await r.json();
    if(!r.ok||!rows||!rows.length){
      showErr("❌","Offerte niet beschikbaar",
        "Stuur de offerte opnieuw vanuit BILLR.<br>De nieuwe link zal correct werken.");
      return;
    }
    var doc=rows[0].offerte_data||{};
    var nr=doc.nummer||params.get("nr")||"Document";
    document.title=nr;
    document.getElementById("docnr").textContent=nr;

    // Track view
    fetch(SB+"/rest/v1/offerte_views",{
      method:"POST",
      headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify({offerte_id:oid,viewed_at:new Date().toISOString()})
    }).catch(function(){});

    // Laad fiches uit apart record
    var fichesByProd={};
    try{
      var fr=await fetch(SB+"/rest/v1/offerte_shares?id=eq."+oid+"_fiches&select=offerte_data",
        {headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}});
      var frows=await fr.json();
      if(Array.isArray(frows)&&frows.length>0&&frows[0].offerte_data&&frows[0].offerte_data.fiches){
        frows[0].offerte_data.fiches.forEach(function(f){
          if(f.productId) fichesByProd[f.productId]=f.fiches;
        });
      }
    }catch(e){}

    // Bouw de volledige HTML pagina
    var html;
    if(doc._docHtml){
      // Gebruik de opgeslagen rendered HTML van de app (identiek aan preview)
      // Voeg fiches toe als extra pagina's
      var ficheHtml=buildFicheHtml(doc, fichesByProd);
      var cssLink=doc._cssUrl
        ?'<link href="'+doc._cssUrl+'" rel="stylesheet">'
        :'';
      html='<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8">'
        +'<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">'
        +cssLink
        +'<style>*{box-sizing:border-box}body{margin:0;padding:0;background:#f1f5f9;font-family:Inter,Arial,sans-serif;font-size:13px;color:#1e293b}'
        +'.doc-wrap{padding:16px;background:#f0f4f8}'
        +'.doc-page{background:#fff;max-width:820px;width:100%;margin:0 auto 20px;box-shadow:0 2px 12px rgba(0,0,0,.1);border-radius:4px;overflow:visible;box-sizing:border-box;display:flex;flex-direction:column}'
        +'@media print{body{background:#fff}.doc-wrap{padding:0}@page{size:A4;margin:0}.doc-page{box-shadow:none;border-radius:0;margin:0;width:210mm;height:297mm;max-height:297mm;overflow:hidden;break-after:page;page-break-after:always}.doc-page:last-child{break-after:auto;page-break-after:auto}.qt-footer{margin-top:auto;flex-shrink:0}.qt-pg,.fct-pg,.fct-pg2,.prod-page{flex:1;overflow:hidden}}'
        +'</style></head><body><div class="doc-wrap">'+doc._docHtml+ficheHtml+'</div></body></html>';
    } else {
      // Fallback: simpele weergave met JSON data
      html=buildFallbackHtml(doc, fichesByProd, nr);
    }

    // Toon in iframe
    var blob=new Blob([html],{type:"text/html;charset=utf-8"});
    var blobUrl=URL.createObjectURL(blob);
    var iframe=document.getElementById("docframe");
    iframe.src=blobUrl;
    iframe.onload=function(){
      try{
        var h=iframe.contentDocument.documentElement.scrollHeight;
        iframe.style.height=Math.max(h,600)+"px";
      }catch(e){iframe.style.height="1400px";}
    };

    document.getElementById("printbtn").onclick=function(){iframe.contentWindow.print();};
    document.getElementById("spin").style.display="none";
    document.getElementById("frame-wrap").style.display="block";

    // Akkoord knoppen
    var isF=(doc.type==="factuur")||String(nr).startsWith("FACT");
    var toonAk=!isF&&(doc._sj?doc._sj.toonBevestigingslink!==false:true);
    if(toonAk){
      document.getElementById("akbalk").style.display="flex";
      async function reageer(st){
        document.getElementById("bok").disabled=true;document.getElementById("baf").disabled=true;
        try{
          var res=await fetch(SB+"/rest/v1/offerte_responses",{
            method:"POST",
            headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
            body:JSON.stringify({offerte_id:oid,status:st,submitted_at:new Date().toISOString(),opmerkingen:""})
          });
          if(!res.ok)throw new Error("HTTP "+res.status);
          document.getElementById("akbalk").innerHTML='<p style="font-size:14px;font-weight:700;color:'+(st==="akkoord"?"#10b981":"#ef4444")+'">'+(st==="akkoord"?"✅ Akkoord ontvangen!":"❌ Afwijzing geregistreerd.")+'</p>';
        }catch(e){
          document.getElementById("bok").disabled=false;document.getElementById("baf").disabled=false;
          var bed=doc._bed||{};
          location.href="mailto:"+encodeURIComponent(bed.email||"")+"?subject="+encodeURIComponent((st==="akkoord"?"Akkoord: ":"Afgewezen: ")+nr)+"&body="+encodeURIComponent((st==="akkoord"?"Ik ga akkoord met offerte ":"Ik ga niet akkoord met offerte ")+nr);
        }
      }
      document.getElementById("bok").onclick=function(){if(confirm("Bevestig akkoord met "+nr+"?"))reageer("akkoord");};
      document.getElementById("baf").onclick=function(){if(confirm("Offerte "+nr+" afwijzen?"))reageer("afgewezen");};
    }

  }catch(e){showErr("❌","Fout",e.message);}
}

function buildFicheHtml(doc, fichesByProd){
  var dc=(doc._dc||"#1a2e4a");
  var html="";
  (doc.lijnen||[]).forEach(function(l){
    if(!l.naam||!l.productId)return;
    var fiches=fichesByProd[l.productId]||[];
    fiches.forEach(function(f){
      var raw=f.data||"";
      if(!raw)return;
      var src=raw.startsWith("data:")?raw:("data:"+(f.type||"application/pdf")+";base64,"+raw);
      var isImg=f.type&&(f.type.includes("image")||f.type.includes("png")||f.type.includes("jpg")||f.type.includes("jpeg"));
      html+="<div class='doc-page' style='overflow:hidden;page-break-after:always'>"
        +"<div style='background:"+dc+";padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0'>"
        +"<span style='color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase'>Technische fiche</span>"
        +"<span style='color:#fff;font-size:12px;font-weight:700'>"+esc(l.naam)+"</span>"
        +(f.naam?"<span style='color:rgba(255,255,255,.4);font-size:10px;margin-left:auto'>"+esc(f.naam)+"</span>":"")
        +"</div>"
        +(isImg
          ?"<div style='flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#f8fafc;padding:12px'>"
            +"<img src='"+src+"' style='max-width:100%;max-height:260mm;object-fit:contain'/></div>"
          :"<div style='flex:1;overflow:hidden'>"
            +"<object data='"+src+"' type='application/pdf' style='width:100%;height:100%;min-height:260mm;display:block'>"
            +"<embed src='"+src+"' type='application/pdf' style='width:100%;height:260mm'/>"
            +"</object></div>"
        )
        +"</div>";
    });
  });
  return html;
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function euro(n){return"€\u00A0"+Number(n||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");}
function datum(d){try{return new Date(d).toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit",year:"numeric"});}catch(e){return d||"";}}

function buildFallbackHtml(doc, fichesByProd, nr){
  // Simpele fallback als _docHtml niet beschikbaar is
  var bed=doc._bed||{},dc=doc._dc||"#1a2e4a",klant=doc.klant||{},lijnen=doc.lijnen||[];
  var sub=0,btwGr={};
  lijnen.forEach(function(l){sub+=(l.prijs||0)*(l.aantal||1);var b=l.btw||0;if(b>0){btwGr[b]=(btwGr[b]||0)+(l.prijs||0)*(l.aantal||1)*(b/100);}});
  var btwTot=Object.values(btwGr).reduce(function(a,b){return a+b;},0);
  var tot=sub+btwTot;
  var ficheHtml=buildFicheHtml(doc, fichesByProd);
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,Arial,sans-serif;background:#f0f4f8;color:#1e293b;font-size:13px}.page{background:#fff;max-width:820px;margin:16px auto;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.1);overflow:hidden;display:flex;flex-direction:column}.hdr{background:'+dc+';padding:24px 32px;display:flex;justify-content:space-between;align-items:flex-start}.hn{color:#fff;font-weight:900;font-size:18px}.hi{font-size:11px;color:rgba(255,255,255,.6);line-height:1.8;margin-top:3px}.ht{font-weight:900;font-size:26px;color:#fff;text-align:right}.hd{font-family:monospace;font-size:11px;color:rgba(255,255,255,.6);text-align:right;margin-top:3px}.body{padding:28px}.meta{display:grid;grid-template-columns:1fr 1fr;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden;margin-bottom:18px}.mi{padding:9px 14px;border-right:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0}.mi:nth-child(2n){border-right:none}.mi:nth-last-child(-n+2){border-bottom:none}.ml{font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:2px}.mv{font-size:12px;font-weight:700}.parties{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}.party{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:12px 14px}.pl{font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:5px}.pn{font-weight:700;font-size:13px;margin-bottom:2px}.pi{font-size:11px;color:#475569;line-height:1.8}table{width:100%;border-collapse:collapse;border:1px solid #e2e8f0;margin-bottom:14px}th{background:#f8fafc;padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;border-bottom:1px solid #e2e8f0}td{padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px}.r{text-align:right}.totbox{display:flex;justify-content:flex-end;margin-bottom:14px}.totinn{min-width:250px;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden}.tr{display:flex;justify-content:space-between;padding:7px 13px;font-size:12px;border-bottom:1px solid #f1f5f9}.tr.last{border-bottom:none;font-weight:800;font-size:14px;background:#f0fdf4;padding:10px 13px}.gray{color:#64748b}.betaal{background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:11px 13px;margin-bottom:10px;font-size:12px;line-height:1.8}.ftr{background:'+dc+';padding:10px 32px;display:flex;justify-content:space-between;align-items:center;margin-top:auto}.ft{font-size:10px;color:rgba(255,255,255,.6)}.ft strong{color:rgba(255,255,255,.85)}</style></head><body>'
    +'<div class="page"><div class="hdr"><div><div class="hn">'+esc(bed.naam||"")+'</div><div class="hi">'+esc(bed.adres||"")+" · "+esc(bed.gemeente||"")+"<br>"+esc(bed.tel||"")+" · "+esc(bed.email||"")+"</div></div><div><div class="ht" style="color:#fff">OFFERTE</div><div class="hd">'+esc(nr)+"</div></div></div>"
    +'<div class="body"><div class="meta"><div class="mi"><div class="ml">Datum</div><div class="mv">'+datum(doc.datum||doc.aangemaakt)+"</div></div><div class='mi'><div class='ml'>Geldig tot</div><div class='mv'>"+datum(doc.vervaldatum)+"</div></div><div class='mi'><div class='ml'>BTW</div><div class='mv'>"+(doc.btwRegime==="verlegd"?"BTW verlegd":"Standaard")+"</div></div><div class='mi'><div class='ml'>Betaling</div><div class='mv'>"+(doc.betalingstermijn||14)+" dagen</div></div></div>"
    +'<div class="parties"><div class="party"><div class="pl">Van</div><div class="pn">'+esc(bed.naam||"")+"</div><div class='pi'>"+esc(bed.adres||"")+" "+esc(bed.gemeente||"")+"<br>BTW: "+esc(bed.btwnr||"")+"</div></div><div class='party'><div class='pl'>Klant</div><div class='pn'>"+esc(klant.naam||"")+"</div><div class='pi'>"+esc(klant.adres||"")+" "+esc(klant.gemeente||"")+"</div></div></div>"
    +'<table><thead><tr><th>Omschrijving</th><th>Eenh.</th><th class="r">Prijs</th><th class="r">BTW</th><th class="r">Totaal</th></tr></thead><tbody>'
    +lijnen.filter(function(l){return l.naam;}).map(function(l){var ext=(l.prijs||0)*(l.aantal||1);return"<tr><td><b>"+esc(l.naam)+"</b>"+(l.omschr?"<br><small style='color:#64748b'>"+esc(l.omschr)+"</small>":"")+"</td><td>"+esc(l.eenheid||"stuk")+"</td><td class='r'>"+euro(l.prijs||0)+"</td><td class='r gray'>"+(l.btw||0)+"%</td><td class='r'><b>"+euro(ext)+"</b></td></tr>";}).join("")
    +"</tbody></table>"
    +'<div class="totbox"><div class="totinn"><div class="tr gray"><span>Subtotaal excl. BTW</span><span>'+euro(sub)+"</span></div>"
    +Object.entries(btwGr).map(function(e){return"<div class='tr gray'><span>BTW "+e[0]+"%</span><span>"+euro(e[1])+"</span></div>";}).join("")
    +"<div class='tr last'><span>TOTAAL incl. BTW</span><span style='color:"+dc+"'>"+euro(tot)+"</span></div></div></div>"
    +(bed.iban?"<div class='betaal'><b>Betaling:</b> IBAN "+esc(bed.iban)+(bed.bic?" · BIC "+esc(bed.bic):"")+" · Referentie: "+esc(nr)+"</div>":"")
    +"</div>"
    +'<div class="ftr"><div class="ft"><strong>'+esc(bed.naam||"")+"</strong> · "+esc(bed.adres||"")+" · "+esc(bed.gemeente||"")+"</div><div class='ft'>BTW: "+esc(bed.btwnr||"")+" · IBAN: "+esc(bed.iban||"")+"</div></div></div>"
    +ficheHtml
    +"</body></html>";
}

if(oid)go();else showErr("❌","Ongeldige link","Geen ID gevonden.");
</script>
</body>
</html>
