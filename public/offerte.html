<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offerte bekijken</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px;line-height:1.6}
.action-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:2px solid #e2e8f0;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);flex-wrap:wrap}
.action-bar h2{font-size:16px;flex:1;font-weight:800}
.btn{padding:12px 28px;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn-accept{background:#10b981;color:#fff}.btn-reject{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px 100px}
.doc-page{background:#fff;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:24px;overflow:hidden;display:flex;flex-direction:column}
.cov{display:grid;grid-template-columns:42% 58%;min-height:500px}
.cov-l{padding:48px 36px;display:flex;flex-direction:column;justify-content:space-between;color:#fff}
.cov-r{padding:48px 36px;display:flex;flex-direction:column;justify-content:space-between}
.pg-bar{height:5px;flex-shrink:0}.pg-content{padding:30px 36px;flex:1}
.pg-footer{padding:12px 24px;color:#fff;display:flex;justify-content:space-between;font-size:11px;font-weight:500;margin-top:auto}
.grp-hdr{padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#fff;margin-top:16px}
.qt-tbl{width:100%;border-collapse:collapse}
.qt-tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;border-bottom:2px solid #e2e8f0;background:#f8fafc}
.qt-tbl th.r,.qt-tbl td.r{text-align:right}.qt-tbl th.c,.qt-tbl td.c{text-align:center}
.qt-tbl td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.grp-sub{display:flex;justify-content:flex-end;padding:8px 14px;background:#f8fafc;font-weight:700;font-size:13px;border-bottom:2px solid #e2e8f0}
.tot-box{max-width:380px;margin-left:auto;margin-top:20px}
.tot-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:#475569}
.tot-row.last{padding:12px 16px;border-radius:8px;color:#fff;font-weight:800;font-size:17px;margin-top:8px}
.spec-tag{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:2px 8px;font-size:11px;color:#475569;display:inline-block;margin:2px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:#fff;border-radius:16px;max-width:500px;width:95%;padding:32px;max-height:90vh;overflow-y:auto}
.fg{margin-bottom:16px}.fl{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
.fc{width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit}.fc:focus{outline:none;border-color:#2563eb}
.status-msg{text-align:center;padding:60px 20px}.status-msg .icon{font-size:64px;margin-bottom:16px}
@media print{.action-bar,.bottom-cta,.modal-bg{display:none!important}body{background:#fff}.doc-page{box-shadow:none;margin:0;break-after:page}.wrap{padding:0;max-width:100%}}
@media(max-width:640px){.cov{grid-template-columns:1fr!important;min-height:auto!important}.cov-l,.cov-r{padding:24px 20px!important}.pg-content{padding:16px 20px!important}.btn{padding:10px 16px;font-size:13px}}
</style>
</head>
<body>
<div id="app"><div class="status-msg"><div class="icon">⏳</div><h2>Offerte laden...</h2></div></div>
<script>
const SB_URL="https://qxnxbqkdvvblfkihmjxy.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bnhicWtkdnZibGZraWhtanh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTI3MTMsImV4cCI6MjA4ODkyODcxM30.1JDvrHgxLpU1GZqSjDVGtfnFJg8PHuD-aFpHOxAY1To";
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const P=new URLSearchParams(location.search);
const fE=n=>"€\u00A0"+Number(n||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
const fD=d=>d?new Date(d).toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit",year:"numeric"}):"—";
const fB=n=>{const c=(n||"").replace(/[^0-9]/g,"");return c.length>=9?"BE "+c.slice(0,4)+"."+c.slice(4,7)+"."+c.slice(7):(n||"");};

async function tV(id){try{await sb.from('offerte_views').insert({offerte_id:id,viewed_at:new Date().toISOString(),user_agent:navigator.userAgent.slice(0,200)});}catch(e){}}

async function sR(id,st,d={}){
  try{
    await sb.from('offerte_responses').insert({offerte_id:id,status:st,periode:d.periode||'',opmerkingen:d.opmerkingen||'',submitted_at:new Date().toISOString()});
    console.log('Response saved to offerte_responses');
  }catch(e){console.error('Response save error:',e);}
  document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('active'));
  const app=document.getElementById('app');
  app.innerHTML=st==='goedgekeurd'
    ?'<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdf4,#ecfdf5)"><div style="background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:560px;width:95%;padding:48px 40px;text-align:center"><div style="font-size:80px;margin-bottom:20px">✅</div><h1 style="font-size:28px;color:#059669;margin-bottom:12px">Offerte goedgekeurd!</h1><p style="color:#475569;font-size:16px;line-height:1.6">Bedankt! Wij nemen contact op'+(d.periode?' voor een afspraak <strong>'+d.periode.toLowerCase()+'</strong>.':'.')+'</p><p style="color:#94a3b8;font-size:13px;margin-top:24px">U kunt dit venster sluiten.</p></div></div>'
    :'<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fef2f2,#fff1f2)"><div style="background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:560px;width:95%;padding:48px 40px;text-align:center"><div style="font-size:80px;margin-bottom:20px">📋</div><h1 style="font-size:28px;color:#dc2626;margin-bottom:12px">Offerte afgewezen</h1><p style="color:#475569;font-size:16px">Uw reactie is geregistreerd.</p><p style="color:#94a3b8;font-size:13px;margin-top:24px">U kunt dit venster sluiten.</p></div></div>';
}

function R(doc){
  const dc=doc._dc||'#1a2e4a';const b=doc._bed||{};const sj=doc._sj||{};const vw=doc._vw||{};
  const L=doc.lijnen||[];const G=doc.groepen||[];
  const items=L.filter(l=>!l.isInfo);
  const sub=items.reduce((s,l)=>s+(l.prijs*l.aantal),0);const bg={};items.forEach(l=>{const r=l.btw||21;if(!bg[r])bg[r]=0;bg[r]+=l.prijs*l.aantal*(r/100);});const btw=Object.values(bg).reduce((s,v)=>s+v,0);const tot=sub+btw;
  const gr=[...G.map(g=>({...g,items:L.filter(l=>l.groepId===g.id)})).filter(g=>g.items.length>0)];const rest=L.filter(l=>!l.groepId||!G.find(g=>g.id===l.groepId));if(rest.length)gr.push({id:'r',naam:'Producten',items:rest});
  const uP=[...new Map(L.filter(l=>l.naam&&!l.isInfo).map(l=>[l.naam,l])).values()];
  const btwR={btw6:'6% BTW (renovatie)',btw21:'21% BTW',verlegd:'BTW verlegd'};
  tV(doc.id);window._offId=doc.id;
  let h='';
  // Action bar
  h+='<div class="action-bar"><h2>📋 '+(doc.nummer||'')+' — '+(b.naam||'')+'</h2><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn" style="background:#f1f5f9;color:#475569" onclick="window.print()">🖨</button><button class="btn btn-accept" onclick="showA()">✅ Goedkeuren</button><button class="btn btn-reject" onclick="showR()">❌ Afwijzen</button></div></div><div class="wrap">';
  // PAGE 1: COVER
  h+='<div class="doc-page"><div class="cov"><div class="cov-l" style="background:linear-gradient(155deg,'+dc+','+dc+'ee,#0f172a)">';
  if(b.logo)h+='<img src="'+b.logo+'" alt="" style="max-width:160px;max-height:60px;object-fit:contain;margin-bottom:12px" onerror="this.style.display=\'none\'"/>';
  h+='<div style="margin-top:auto"><div style="font-weight:900;font-size:18px">'+(b.naam||'')+'</div><div style="font-size:11px;opacity:.7;margin-top:4px">'+(b.tagline||'')+'</div><div style="font-size:11px;opacity:.6;margin-top:12px;line-height:1.8">'+(b.adres||'')+'<br>'+(b.gemeente||'')+'<br>'+(b.tel||'')+'<br>'+(b.email||'')+'</div></div>';
  h+='</div><div class="cov-r"><div><div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#94a3b8">Offerte</div><div style="font-family:JetBrains Mono,monospace;font-size:22px;font-weight:800;color:'+dc+';margin-top:4px">'+(doc.nummer||'')+'</div></div>';
  h+='<div style="margin-top:24px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:6px">Klant</div><div style="font-weight:800;font-size:18px">'+(doc.klant?.naam||'')+'</div>'+(doc.klant?.bedrijf?'<div style="font-weight:600;color:#475569">'+doc.klant.bedrijf+'</div>':'')+'<div style="font-size:13px;color:#64748b;line-height:1.7;margin-top:4px">'+(doc.klant?.adres||'')+'<br>'+(doc.klant?.gemeente||'')+'</div>'+(doc.klant?.btwnr?'<div style="font-family:JetBrains Mono,monospace;font-size:11px;color:#64748b;margin-top:4px">'+fB(doc.klant.btwnr)+'</div>':'')+'</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:24px"><div><div style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase">Datum</div><div style="font-weight:700">'+fD(doc.aangemaakt)+'</div></div><div><div style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase">Geldig tot</div><div style="font-weight:700">'+fD(doc.vervaldatum)+'</div></div><div><div style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase">BTW</div><div style="font-weight:700;font-size:12px">'+(btwR[doc.btwRegime]||'—')+'</div></div><div><div style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase">Totaal</div><div style="font-weight:800;font-size:18px;color:'+dc+'">'+fE(tot)+'</div></div></div>';
  h+='<div style="font-size:11px;color:#94a3b8;margin-top:16px">'+(b.naam||'')+' · '+fB(b.btwnr||'')+' · IBAN: '+(b.iban||'')+'</div></div></div></div>';
  // PAGE 2: PRODUCTS
  if(uP.length>0){
    h+='<div class="doc-page"><div class="pg-bar" style="background:'+dc+'"></div><div class="pg-content"><div style="font-weight:900;font-size:20px;color:'+dc+';margin-bottom:4px">Productinformatie & Technische Fiches</div><div style="font-size:12px;color:#64748b;margin-bottom:16px">Producten voor '+(doc.klant?.naam||'')+'</div><div style="height:1px;background:#e2e8f0;margin-bottom:20px"></div>';
    uP.forEach((l,i)=>{
      h+='<div style="display:flex;gap:16px;padding:20px 0;border-bottom:'+(i<uP.length-1?'1px solid #f1f5f9':'none')+';align-items:flex-start">';
      if(l.imageUrl)h+='<div style="width:90px;height:90px;border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;background:#f8fafc;flex-shrink:0"><img src="'+l.imageUrl+'" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.style.display=\'none\'"/></div>';
      h+='<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="background:'+dc+';color:#fff;border-radius:5px;padding:2px 9px;font-size:10px;font-weight:700">Product</span><span style="font-size:11px;color:#94a3b8">×'+l.aantal+' '+(l.eenheid||'stuk')+'</span></div>';
      h+='<div style="font-weight:800;font-size:16px;color:#1e293b;margin-bottom:4px">'+l.naam+'</div>';
      if(l.omschr)h+='<div style="font-size:12.5px;color:#475569;line-height:1.6">'+l.omschr+'</div>';
      if(l.specs&&l.specs.length){h+='<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-top:8px"><div style="font-weight:700;font-size:11px;color:'+dc+';margin-bottom:6px">📋 Specificaties</div><div style="display:flex;flex-wrap:wrap;gap:5px">';l.specs.forEach(s=>{h+='<span class="spec-tag">✓ '+s+'</span>';});h+='</div></div>';}
      h+='</div><div style="flex-shrink:0;text-align:right;background:#f8fafc;border-radius:8px;padding:10px 14px;border:1px solid #e2e8f0"><div style="font-size:10px;color:#94a3b8;font-weight:600">PRIJS</div><div style="font-weight:800;font-size:16px;color:'+dc+'">'+fE(l.prijs)+'</div><div style="font-size:10px;color:#94a3b8">'+(l.btw||21)+'% BTW</div></div></div>';
    });
    h+='</div><div class="pg-footer" style="background:'+dc+'"><span><strong>'+(b.naam||'')+'</strong></span><span>'+(doc.nummer||'')+'</span></div></div>';
  }
  // PAGE 3: QUOTE DETAIL
  h+='<div class="doc-page"><div class="pg-bar" style="background:'+dc+'"></div><div class="pg-content">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div style="font-weight:900;font-size:16px;color:'+dc+'">⚡ '+(b.naam||'')+'<div style="font-size:11px;color:#64748b;font-weight:400">'+(b.adres||'')+' · '+(b.gemeente||'')+'</div></div><div style="text-align:right"><div style="font-size:28px;font-weight:900;color:'+dc+'">OFFERTE</div><div style="font-family:JetBrains Mono,monospace;font-size:14px;color:'+dc+'">'+( doc.nummer||'')+'</div></div></div>';
  gr.forEach(g=>{
    h+='<div class="grp-hdr" style="background:'+dc+'">'+g.naam+'</div><table class="qt-tbl"><thead><tr><th>Omschrijving</th><th>Eenh.</th><th class="c">Aantal</th><th class="r">Prijs excl.</th><th class="r">BTW</th><th class="r">Totaal</th></tr></thead><tbody>';
    g.items.forEach(l=>{
      if(l.isInfo){h+='<tr style="background:#f8fafc"><td colspan="6" style="font-style:italic;color:#64748b;font-size:12px;padding:6px 12px">'+l.naam+'</td></tr>';}
      else{h+='<tr><td><div style="font-weight:600">'+l.naam+'</div>'+(l.omschr?'<div style="font-size:11px;color:#64748b;font-style:italic">'+l.omschr+'</div>':'')+'</td><td>'+(l.eenheid||'stuk')+'</td><td class="c">'+l.aantal+'</td><td class="r">'+fE(l.prijs)+'</td><td class="r">'+(l.btw||21)+'%</td><td class="r"><strong>'+fE(l.prijs*l.aantal)+'</strong></td></tr>';}
    });
    h+='</tbody></table><div class="grp-sub"><span>Subtotaal '+g.naam+':&nbsp;&nbsp;</span><strong>'+fE(g.items.filter(l=>!l.isInfo).reduce((s,l)=>s+l.prijs*l.aantal,0))+'</strong></div>';
  });
  h+='<div class="tot-box"><div class="tot-row"><span>Subtotaal excl. BTW</span><span>'+fE(sub)+'</span></div>';
  Object.entries(bg).forEach(([p,v])=>{h+='<div class="tot-row"><span>BTW '+p+'%</span><span>'+fE(v)+'</span></div>';});
  h+='<div class="tot-row last" style="background:'+dc+'"><span>TOTAAL incl. BTW</span><span>'+fE(tot)+'</span></div></div>';
  h+='<div style="margin-top:20px;padding:14px 18px;background:#f1f5f9;border-radius:8px;font-size:13px"><strong>Betaling:</strong> IBAN '+(b.iban||'')+' · Mededeling: '+(doc.nummer||'')+'</div>';
  if(doc.voorschot&&doc.voorschot!=="Geen voorschot")h+='<div style="margin-top:10px;padding:14px 18px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:13px">💡 <strong>Voorschot:</strong> '+doc.voorschot+'</div>';
  if(doc.notities)h+='<div style="margin-top:10px;padding:14px 18px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:13px">📝 '+doc.notities+'</div>';
  h+='<div style="margin-top:20px;padding:20px;border:2px dashed #e2e8f0;border-radius:8px;text-align:center"><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8">Akkoord klant — datum, handtekening & naam</div></div>';
  h+='</div><div class="pg-footer" style="background:'+dc+'"><span><strong>'+(b.naam||'')+'</strong> · '+(b.adres||'')+', '+(b.gemeente||'')+'</span><span>BTW: '+fB(b.btwnr||'')+'</span></div></div>';
  // PAGE 4: VOORWAARDEN
  if(vw.tekst){h+='<div class="doc-page"><div class="pg-bar" style="background:'+dc+'"></div><div class="pg-content"><div style="font-weight:900;font-size:18px;color:'+dc+';margin-bottom:16px">Algemene Voorwaarden</div><div style="font-size:11px;line-height:1.6;color:#475569;white-space:pre-line">'+vw.tekst+'</div></div><div class="pg-footer" style="background:'+dc+'"><span>'+(b.naam||'')+'</span><span>'+fB(b.btwnr||'')+'</span></div></div>';}
  // CTA
  h+='<div class="doc-page bottom-cta" style="text-align:center;padding:40px"><h3 style="font-size:20px;margin-bottom:16px">Uw beslissing over '+(doc.nummer||'')+'</h3><p style="color:#64748b;margin-bottom:24px">Totaal: <strong style="color:'+dc+';font-size:22px">'+fE(tot)+'</strong></p><div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap"><button class="btn btn-accept" style="font-size:16px;padding:18px 48px" onclick="showA()">✅ Goedkeuren</button><button class="btn btn-reject" style="font-size:16px;padding:18px 48px" onclick="showR()">❌ Afwijzen</button></div></div>';
  h+='</div>';
  // Modals
  h+='<div class="modal-bg" id="aM"><div class="modal"><h2 style="margin-bottom:20px;color:#10b981">✅ Offerte goedkeuren</h2><p style="margin-bottom:20px;color:#64748b">Bevestig offerte <strong>'+(doc.nummer||'')+'</strong> voor <strong>'+fE(tot)+'</strong>.</p><div class="fg"><label class="fl">📅 Gewenste periode</label><select class="fc" id="aP"><option value="">— Kies —</option><option>Zo snel mogelijk</option><option>Binnen 2 weken</option><option>Binnen 1 maand</option><option>Binnen 2 maanden</option><option>Na overleg</option></select></div><div class="fg"><label class="fl">💬 Extra info</label><textarea class="fc" id="aN" rows="3" placeholder="Bijv: ochtend..."></textarea></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn btn-reject" style="flex:1" onclick="cM()">Annuleren</button><button class="btn btn-accept" style="flex:1" onclick="dA()">✅ Bevestigen</button></div></div></div>';
  h+='<div class="modal-bg" id="rM"><div class="modal"><h2 style="margin-bottom:20px;color:#ef4444">❌ Afwijzen</h2><div class="fg"><label class="fl">Reden (optioneel)</label><textarea class="fc" id="rR" rows="3"></textarea></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn" style="flex:1;background:#f1f5f9;color:#64748b" onclick="cM()">Annuleren</button><button class="btn" style="flex:1;background:#ef4444;color:#fff" onclick="dR()">❌ Afwijzen</button></div></div></div>';
  document.getElementById('app').innerHTML=h;
}
window.showA=()=>document.getElementById('aM').classList.add('active');
window.showR=()=>document.getElementById('rM').classList.add('active');
window.cM=()=>document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('active'));
window.dA=()=>sR(window._offId,'goedgekeurd',{periode:document.getElementById('aP')?.value||'',opmerkingen:document.getElementById('aN')?.value||''});
window.dR=()=>sR(window._offId,'afgewezen',{opmerkingen:document.getElementById('rR')?.value||''});

async function init(){
  const token=P.get('token');const data=P.get('data');
  if(token){
    try{const{data:row,error}=await sb.from('shared_offertes').select('offerte_data,settings_data').eq('token',token).single();
      if(error||!row){document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">❌</div><h2>Offerte niet gevonden</h2><p>Link ongeldig of verlopen.</p></div>';return;}
      const doc=row.offerte_data;if(row.settings_data){doc._sj=row.settings_data.sjabloon||{};doc._vw=row.settings_data.voorwaarden||{};if(row.settings_data.bedrijf)doc._bed={...doc._bed,...row.settings_data.bedrijf};}
      R(doc);
    }catch(e){document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">❌</div><h2>Fout</h2><p>'+e.message+'</p></div>';}
  }else if(data){try{const d=JSON.parse(decodeURIComponent(atob(data)));R(d);}catch(e){document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">❌</div><h2>Ongeldige link</h2><p>'+e.message+'</p></div>';}}
  else{document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">📋</div><h2>Geen offerte</h2><p>Gebruik de link uit uw email.</p></div>';}
}
init();
</script>
</body>
</html>
