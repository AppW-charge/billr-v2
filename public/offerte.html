<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offerte bekijken</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Arial,sans-serif;background:#f1f5f9;min-height:100vh;padding:0}
#spin{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px}
.sp{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#msg{display:none;max-width:520px;margin:60px auto;background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.08);padding:48px 32px;text-align:center}
#msg .ico{font-size:52px;margin-bottom:16px}
#msg h2{font-size:22px;font-weight:800;color:#1e293b;margin-bottom:10px}
#msg p{font-size:14px;color:#64748b;line-height:1.7}
/* Rendered HTML mode */
#rendered{display:none}
#rendered .printbar{padding:10px 16px;background:#1e293b;display:flex;gap:12px;align-items:center;font-family:Inter,Arial,sans-serif;font-size:13px;position:sticky;top:0;z-index:100}
#rendered .printbar strong{color:#fff}
#rendered .printbar .pbtn{background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
#rendered .printbar .pbtn:hover{background:#2563eb}
#rendered .ptip{color:rgba(255,255,255,.55);font-size:12px}
/* Akkoord balk onder het document */
#akbalk{display:none;position:sticky;bottom:0;background:#fff;border-top:2px solid #e2e8f0;padding:14px 20px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;z-index:100}
#akbalk p{font-size:13px;color:#64748b;margin-right:8px}
.akbtn{padding:12px 24px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.akbtn-ok{background:#10b981;color:#fff}
.akbtn-af{background:#f1f5f9;color:#64748b;border:2px solid #e2e8f0}
.akbtn:disabled{opacity:.5;cursor:not-allowed}
#iframe-wrap{overflow-x:auto;background:#f1f5f9;min-height:calc(100vh - 50px)}
#iframe-wrap iframe{width:100%;border:none;display:block;min-height:calc(100vh - 100px)}
</style>
</head>
<body>
<div id="spin"><div class="sp"></div><p style="color:#64748b;font-size:13px">Even geduld...</p></div>
<div id="msg"><div class="ico" id="msg-ico">❌</div><h2 id="msg-h">Niet beschikbaar</h2><p id="msg-p">Deze link is niet meer geldig.</p></div>
<div id="rendered">
  <div class="printbar">
    <strong id="doc-nr">Document</strong>
    <button class="pbtn" onclick="window.print()">🖨 Afdrukken / PDF</button>
    <span class="ptip">Kies "Microsoft Print to PDF" of "Opslaan als PDF"</span>
  </div>
  <div id="iframe-wrap"></div>
</div>
<div id="akbalk" style="display:none">
  <p>Gaat u akkoord met deze offerte?</p>
  <button class="akbtn akbtn-ok" id="btn-ok">✅ Ik ga akkoord</button>
  <button class="akbtn akbtn-af" id="btn-af">❌ Niet akkoord</button>
</div>

<script>
var SB="https://qxnxbqkdvvblfkihmjxy.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bnhicWtkdnZibGZraWhtanh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTI3MTMsImV4cCI6MjA4ODkyODcxM30.1JDvrHgxLpU1GZqSjDVGtfnFJg8PHuD-aFpHOxAY1To";
var params=new URLSearchParams(location.search);
var oid=params.get("id");

function showSpin(on){document.getElementById("spin").style.display=on?"flex":"none";}
function showMsg(ico,h,p){showSpin(false);var m=document.getElementById("msg");m.style.display="block";document.getElementById("msg-ico").textContent=ico;document.getElementById("msg-h").textContent=h;document.getElementById("msg-p").innerHTML=p;}

async function go(){
  if(!oid){showMsg("❌","Ongeldige link","Geen document ID gevonden.");return;}
  try{
    var r=await fetch(SB+"/rest/v1/offerte_shares?id=eq."+oid+"&select=offerte_data",{headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}});
    var rows=await r.json();
    if(!r.ok)throw new Error("HTTP "+r.status);
    if(!rows||!rows.length){
      showMsg("❌","Offerte niet beschikbaar","Deze link is niet meer geldig of de offerte werd nog niet gedeeld.<br><br>Vraag een nieuwe link via de afzender.");
      return;
    }
    var doc=rows[0].offerte_data||{};
    var nr=doc.nummer||params.get("nr")||"Document";
    document.title=nr+" — Offerte bekijken";
    document.getElementById("doc-nr").textContent=nr;

    // Track view
    fetch(SB+"/rest/v1/offerte_views",{method:"POST",headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({offerte_id:oid,viewed_at:new Date().toISOString()})}).catch(function(){});

    showSpin(false);
    document.getElementById("rendered").style.display="block";

    if(doc._renderedHtml){
      // Gebruik de exacte rendered HTML van de app (identiek aan in-app preview)
      var blob=new Blob([doc._renderedHtml],{type:"text/html"});
      var url=URL.createObjectURL(blob);
      var ifr=document.createElement("iframe");
      ifr.src=url;
      ifr.style.cssText="width:100%;border:none;display:block;";
      // Pas hoogte aan op inhoud
      ifr.onload=function(){
        try{
          var h=ifr.contentDocument.documentElement.scrollHeight;
          ifr.style.height=(Math.max(h,600))+"px";
        }catch(e){ifr.style.height="2000px";}
      };
      document.getElementById("iframe-wrap").appendChild(ifr);
    } else {
      // Fallback: toon bericht dat offerte opnieuw verstuurd moet worden
      document.getElementById("iframe-wrap").innerHTML='<div style="text-align:center;padding:60px 24px;color:#64748b"><div style="font-size:48px;margin-bottom:16px">📄</div><div style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:8px">'+nr+'</div><div style="font-size:13px;line-height:1.7">De offerte kon niet worden weergegeven.<br>Vraag de afzender om de offerte opnieuw te versturen.</div></div>';
    }

    // Toon akkoord knoppen voor offertes
    var isFactuur=(doc.type==="factuur")||String(doc.nummer||"").startsWith("FACT");
    var toonAk=!isFactuur&&(doc._sj?doc._sj.toonBevestigingslink!==false:true);
    if(toonAk){
      var akbalk=document.getElementById("akbalk");
      akbalk.style.display="flex";
      async function reageer(st){
        document.getElementById("btn-ok").disabled=true;
        document.getElementById("btn-af").disabled=true;
        try{
          var res=await fetch(SB+"/rest/v1/offerte_responses",{method:"POST",headers:{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify({offerte_id:oid,status:st,submitted_at:new Date().toISOString(),opmerkingen:""})});
          if(!res.ok)throw new Error("HTTP "+res.status);
          akbalk.innerHTML='<p style="font-size:14px;font-weight:700;color:'+(st==="akkoord"?"#10b981":"#ef4444")+'">'+(st==="akkoord"?"✅ Akkoord ontvangen! Wij nemen contact op.":"❌ Afwijzing geregistreerd.")+'</p>';
        }catch(e){
          var bed=doc._bed||{};
          var sub=encodeURIComponent((st==="akkoord"?"Akkoord: ":"Afgewezen: ")+(doc.nummer||""));
          var bod=encodeURIComponent((st==="akkoord"?"Ik ga akkoord met offerte ":"Ik ga niet akkoord met offerte ")+(doc.nummer||""));
          location.href="mailto:"+encodeURIComponent(bed.email||"")+"?subject="+sub+"&body="+bod;
          document.getElementById("btn-ok").disabled=false;
          document.getElementById("btn-af").disabled=false;
        }
      }
      document.getElementById("btn-ok").onclick=function(){if(confirm("Bevestig uw akkoord met "+nr+"?"))reageer("akkoord");};
      document.getElementById("btn-af").onclick=function(){if(confirm("Offerte "+nr+" afwijzen?"))reageer("afgewezen");};
    }

  }catch(e){
    showMsg("❌","Fout bij laden","Technische fout: "+e.message+"<br><br>Probeer opnieuw of contacteer ons.");
  }
}
if(oid)go();else showMsg("❌","Ongeldige link","Geen document ID in de URL.");
</script>
</body>
</html>
