async function renderPdfFiche(b64,el){
  if(!window.pdfjsLib){el.innerHTML='<div style="padding:16px;text-align:center;color:#94a3b8">PDF viewer niet beschikbaar</div>';return;}
  try{let d;if(b64.startsWith('data:'))d=atob(b64.split(',')[1]);else d=atob(b64);
  const u=new Uint8Array(d.length);for(let i=0;i<d.length;i++)u[i]=d.charCodeAt(i);
  const pdf=await window.pdfjsLib.getDocument({data:u}).promise;
  for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const sc=1.5;const vp=pg.getViewport({scale:sc});const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;cv.style.cssText='width:100%;height:auto;display:block';const ctx=cv.getContext('2d');await pg.render({canvasContext:ctx,viewport:vp}).promise;el.appendChild(cv);}
  }catch(e){el.innerHTML='<div style="padding:16px;text-align:center;color:#ef4444">Kan fiche niet laden</div>';}
}

window.showA=()=>document.getElementById('aM').classList.add('active');

async function init(){
  const token=P.get('token');const data=P.get('data');
  if(token){
    try{const{data:row,error}=await sb.from('shared_offertes').select('offerte_data,settings_data').eq('token',token).single();
      if(error||!row){document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">❌</div><h2>Offerte niet gevonden</h2><p>Link ongeldig of verlopen.</p></div>';return;}
      const doc=row.offerte_data;
      if(row.settings_data){
        doc._sj=row.settings_data.sjabloon||{};
        doc._vw=row.settings_data.voorwaarden||{};
        doc._lyt=row.settings_data.layout||{};
        if(row.settings_data.bedrijf)doc._bed={...doc._bed,...row.settings_data.bedrijf};
        if(row.settings_data.email)doc._emailCfg=row.settings_data.email;
      }
      R(doc);
    }catch(e){document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">❌</div><h2>Fout</h2><p>'+e.message+'</p></div>';}
  }else if(data){try{const d=JSON.parse(decodeURIComponent(atob(data)));R(d);}catch(e){document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">❌</div><h2>Ongeldige link</h2><p>'+e.message+'</p></div>';}}
  else{document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">📋</div><h2>Geen offerte</h2><p>Gebruik de link uit uw email.</p></div>';}
}
init();
