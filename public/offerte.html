<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offerte bekijken</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',Arial,sans-serif;background:#e8ecf1;color:#1e293b;font-size:13.5px;line-height:1.5}
.fab{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:2px solid #e2e8f0;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,.12);flex-wrap:wrap}
.fab-btn{padding:13px 28px;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
.fab-accept{background:#10b981;color:#fff}.fab-accept:hover{background:#059669}
.fab-reject{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}.fab-reject:hover{background:#fef2f2;color:#ef4444}
.doc-wrap{max-width:860px;margin:0 auto;padding:16px 12px 110px}
.doc-page{background:#fff;margin-bottom:14px;border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
.doc-page-lbl{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin:10px 0 4px}
.cov{display:grid;grid-template-columns:42% 58%;min-height:280px}
.cov-l{display:flex;flex-direction:column;padding:36px 28px;position:relative;overflow:hidden;color:#fff;justify-content:center}
.cov-l::after{content:'';position:absolute;bottom:-80px;right:-80px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.06)}
.cov-r{padding:36px 32px;display:flex;flex-direction:column;justify-content:center}
.qt-wrap{padding:28px 32px}
.qt-meta-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;flex:1;min-width:100px}
.qt-meta-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.qt-meta-val{font-size:13px;font-weight:700;color:#1e293b;margin-top:2px}
.qt-parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.qt-party-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.qt-party-name{font-weight:800;font-size:14px}
.qt-party-info{font-size:12px;color:#475569}
.grp-hdr{color:#fff;padding:8px 12px;font-weight:700;font-size:13px;border-radius:6px 6px 0 0}
.qt-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px;table-layout:fixed}
.qt-tbl th{text-align:left;padding:7px 8px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-weight:700;color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.3px;word-break:keep-all}
.qt-tbl td{padding:7px 8px;border-bottom:1px solid #f1f5f9;word-break:break-word}
.qt-tbl .c{text-align:center}.qt-tbl .r{text-align:right}
.qt-item-main{font-weight:600;word-break:break-word}.qt-item-sub{font-size:11px;color:#64748b;margin-top:1px}
.grp-sub{display:flex;justify-content:space-between;padding:6px 12px;background:#f8fafc;border-radius:0 0 6px 6px;font-size:11.5px;color:#475569;margin-bottom:14px}
.qt-tot-box{margin-left:auto;min-width:240px;max-width:100%;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.qt-tot-row{display:flex;justify-content:space-between;padding:7px 14px;font-size:13px;border-bottom:1px solid #f1f5f9}
.qt-tot-row.last{font-size:15px;font-weight:800;border-bottom:none}
.prod-page{padding:24px 28px}
.prod-item{display:flex;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid #e2e8f0;align-items:flex-start}
.prod-img{width:72px;height:72px;border-radius:8px;object-fit:contain;background:#f8fafc;border:1px solid #e2e8f0;flex-shrink:0}
.prod-name{font-weight:800;font-size:14px;margin-bottom:3px}
.prod-desc{font-size:12px;color:#475569;line-height:1.5}
.spec-tag{display:inline-block;background:#f1f5f9;border-radius:4px;padding:2px 7px;font-size:10.5px;color:#475569;margin:2px 2px 0 0}
.prod-price-box{flex-shrink:0;text-align:right;background:#f8fafc;border-radius:8px;padding:8px 12px;border:1px solid #e2e8f0;min-width:90px}
.voorw-page{padding:24px 28px;font-size:11.5px;color:#475569;line-height:1.7;white-space:pre-line}
.doc-footer{padding:10px 20px;text-align:center;color:#fff;font-size:11px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-bg.active{display:flex}
.modal{background:#fff;border-radius:16px;max-width:500px;width:100%;padding:28px;max-height:90vh;overflow-y:auto}
.fg{margin-bottom:14px}.fl{display:block;font-weight:600;font-size:13px;margin-bottom:6px}.fc{width:100%;padding:10px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit}.fc:focus{outline:none;border-color:#2563eb}
.status-msg{text-align:center;padding:60px 20px}.status-msg .icon{font-size:64px;margin-bottom:16px}
/* ── RESPONSIVE MOBILE ── */
@media(max-width:640px){
  body{font-size:13px}
  .doc-wrap{padding:8px 6px 120px}
  .cov{grid-template-columns:1fr!important;min-height:auto}
  .cov-l{padding:24px 18px;min-height:160px}
  .cov-r{padding:20px 18px}
  .qt-wrap{padding:16px}
  .qt-parties{grid-template-columns:1fr;gap:12px}
  .qt-meta-item{min-width:80px}
  .qt-tbl{font-size:11px}
  .qt-tbl th,.qt-tbl td{padding:5px 5px}
  .qt-tbl th:nth-child(3),.qt-tbl td:nth-child(3){display:none}  /* verberg eenheid op mobile */
  .qt-tot-box{min-width:0;width:100%}
  .prod-page{padding:16px}
  .prod-item{flex-wrap:wrap;gap:10px}
  .prod-img{width:56px;height:56px}
  .prod-price-box{width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center}
  .voorw-page{padding:16px}
  .fab{padding:8px 12px;gap:8px}
  .fab-btn{padding:12px 18px;font-size:13px;flex:1;justify-content:center}
  .modal{padding:20px}
  .grp-sub{flex-direction:column;gap:2px}
}
</style>
</head>
<body>
<div id="app"><div class="status-msg"><div class="icon">⏳</div><h2>Offerte laden...</h2><p>Even geduld</p></div></div>
<script>
const SB_URL="https://qxnxbqkdvvblfkihmjxy.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bnhicWtkdnZibGZraWhtanh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTI3MTMsImV4cCI6MjA4ODkyODcxM30.1JDvrHgxLpU1GZqSjDVGtfnFJg8PHuD-aFpHOxAY1To";
const params=new URLSearchParams(window.location.search);
const offId=params.get('id');
const offerteData=params.get('data');
const fmtEuro=n=>"€\u00A0"+Number(n||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
const fmtDate=d=>d?new Date(d).toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit",year:"numeric"}):"—";
const fmtBtwnr=b=>(b||"").replace(/^BE\s*/,"BE ").replace(/(\d{4})(\d{3})(\d{3})/,"$1.$2.$3");

async function trackView(id){try{const s=window.supabase.createClient(SB_URL,SB_KEY);await s.from('offerte_views').insert({offerte_id:id,viewed_at:new Date().toISOString(),user_agent:navigator.userAgent.slice(0,200)});}catch(e){}}

async function submitResponse(id,status,data={}){
  try{
    var s=window.supabase.createClient(SB_URL,SB_KEY);
    var r=await s.from('offerte_responses').insert({offerte_id:id,status:status,periode:data.periode||'',opmerkingen:data.opmerkingen||'',submitted_at:new Date().toISOString()});
    console.log('📝 Response saved:',status,r.error?'ERROR: '+JSON.stringify(r.error):'OK');
  }catch(e){console.error('Submit error:',e)}
  var ok=status==='goedgekeurd';
  var bedNaam=window._bedNaam||'';
  var bedTel=window._bedTel||'';
  var bedEmail=window._bedEmail||'';
  document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">'+(ok?'✅':'❌')+'</div><h2 style="color:'+(ok?'#059669':'#dc2626')+';font-size:22px;margin-bottom:10px">'+(ok?'Offerte goedgekeurd!':'Offerte afgewezen')+'</h2>'+(ok?'<p style="font-size:14px;color:#475569;line-height:1.6;max-width:420px;margin:0 auto 20px">Bedankt voor uw vertrouwen! Uw akkoord is geregistreerd.<br>U ontvangt binnenkort een email met de voorgestelde installatiedatum.</p><div style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:14px;padding:20px 24px;display:inline-block;text-align:left;min-width:280px;margin-bottom:20px"><div style="font-weight:800;color:#065f46;font-size:14px;margin-bottom:10px">📋 Wat gebeurt er nu?</div><div style="font-size:13px;color:#047857;line-height:2"><div>1️⃣ &nbsp;Uw akkoord is ontvangen</div><div>2️⃣ &nbsp;Wij stellen een installatiedatum voor</div><div>3️⃣ &nbsp;U bevestigt de datum via email</div><div>4️⃣ &nbsp;Installatie gaat door op afgesproken datum</div></div></div>'+(bedTel||bedEmail?'<div style="margin-top:8px;font-size:13px;color:#64748b">Vragen? <a href="tel:'+bedTel+'" style="color:#2563eb;text-decoration:none;font-weight:600">'+bedTel+'</a>'+(bedEmail?' · <a href="mailto:'+bedEmail+'" style="color:#2563eb;text-decoration:none;font-weight:600">'+bedEmail+'</a>':'')+'</div>':''):'<p style="margin-top:12px;color:#475569">Uw reactie is geregistreerd. Bedankt voor uw feedback.</p><p style="margin-top:8px;font-size:13px;color:#94a3b8">We nemen eventueel contact op om te bekijken hoe we beter kunnen aansluiten bij uw verwachtingen.</p>')+'</div>';
}

function renderOfferte(doc){
  const dc=doc._dc||'#1a2e4a';const bed=doc._bed||{};const sj=doc._sj||{};const groepen=doc.groepen||[];const lijnen=doc.lijnen||[];const vw=doc._voorwaarden||'';
  const sub=lijnen.reduce((s,l)=>s+(l.prijs||0)*(l.aantal||1),0);
  const bg={};lijnen.forEach(l=>{const b=l.btw||0;const a=(l.prijs||0)*(l.aantal||1)*(b/100);if(!bg[b])bg[b]=0;bg[b]+=a;});
  const btw=Object.values(bg).reduce((s,v)=>s+v,0);const tot=sub+btw;
  const gl=[...groepen.map(g=>({...g,items:lijnen.filter(l=>l.groepId===g.id)})).filter(g=>g.items.length>0)];
  const rest=lijnen.filter(l=>!l.groepId||!groepen.find(g=>g.id===l.groepId));
  if(rest.length)gl.push({id:'rest',naam:'Producten',items:rest});
  const up=lijnen.filter(function(l){return l.naam&&(l.imageUrl||l.omschr||(l.specs||[]).length||(l.technischeFiches||[]).length||l.technischeFiche);});
  trackView(doc.id);window._offId=doc.id;window._bedNaam=bed.naam||'';window._bedTel=bed.tel||'';window._bedEmail=bed.email||'';

  document.getElementById('app').innerHTML=
  '<div class="fab"><button class="fab-btn fab-accept" onclick="showAcceptModal()">✅ Offerte goedkeuren</button><button class="fab-btn fab-reject" onclick="showRejectModal()">❌ Afwijzen</button></div>'+
  '<div class="doc-wrap">'+
  '<div class="doc-page-lbl">Voorblad</div><div class="doc-page"><div class="cov"><div class="cov-l" style="background:linear-gradient(155deg,'+dc+' 0%,'+dc+'ee 70%,#0f172a 100%)">'+(bed.logo?'<img src="'+bed.logo+'" alt="" style="max-height:60px;max-width:180px;margin-bottom:16px;object-fit:contain"/>':'<div style="font-size:24px;font-weight:900;letter-spacing:-1px;margin-bottom:12px">'+(bed.naam||'')+'</div>')+'<div style="font-size:12px;opacity:.7;margin-top:auto">'+(bed.adres||'')+'<br>'+(bed.gemeente||'')+'<br>'+(bed.tel||'')+'<br>'+(bed.email||'')+'</div></div>'+
  '<div class="cov-r"><div style="color:'+dc+';font-size:28px;font-weight:900;letter-spacing:-1px">'+(sj.voorbladTitel||'OFFERTE')+'</div><div style="font-family:JetBrains Mono,monospace;font-size:14px;color:#94a3b8;margin-top:4px">'+(doc.nummer||'')+'</div>'+
  '<div style="margin-top:24px"><div class="qt-party-lbl">Klant</div><div class="qt-party-name">'+(doc.klant?.naam||'')+'</div>'+(doc.klant?.bedrijf?'<div style="font-weight:600;color:#475569;font-size:12.5px">'+doc.klant.bedrijf+'</div>':'')+'<div class="qt-party-info">'+(doc.klant?.adres||'')+'</div><div class="qt-party-info">'+(doc.klant?.gemeente||'')+'</div>'+(doc.klant?.btwnr?'<div style="font-family:JetBrains Mono,monospace;font-size:10.5px;color:#64748b;margin-top:3px">'+fmtBtwnr(doc.klant.btwnr)+'</div>':'')+'</div>'+
  '<div style="margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="qt-meta-item"><div class="qt-meta-lbl">Datum</div><div class="qt-meta-val">'+fmtDate(doc.datum||doc.aangemaakt)+'</div></div><div class="qt-meta-item"><div class="qt-meta-lbl">Geldig tot</div><div class="qt-meta-val">'+fmtDate(doc.vervaldatum)+'</div></div><div class="qt-meta-item"><div class="qt-meta-lbl">Referentie</div><div class="qt-meta-val" style="font-family:JetBrains Mono,monospace;font-size:12px">'+(doc.nummer||'')+'</div></div><div class="qt-meta-item"><div class="qt-meta-lbl">Totaal incl. BTW</div><div class="qt-meta-val" style="color:'+dc+';font-size:16px">'+fmtEuro(tot)+'</div></div></div></div></div></div>'+
  
  '<div class="doc-page-lbl">Offertelijnen</div><div class="doc-page"><div style="height:5px;background:'+dc+'"></div><div class="qt-wrap">'+
  '<div class="qt-parties"><div><div class="qt-party-name">'+(bed.naam||'')+'</div><div class="qt-party-info">'+(bed.adres||'')+'</div><div class="qt-party-info">'+(bed.gemeente||'')+'</div><div style="font-family:JetBrains Mono,monospace;font-size:10.5px;color:#64748b;margin-top:3px">'+fmtBtwnr(bed.btwnr||'')+'<br>IBAN: '+(bed.iban||'')+'</div></div><div><div class="qt-party-lbl">Klant</div><div class="qt-party-name">'+(doc.klant?.naam||'')+'</div><div class="qt-party-info">'+(doc.klant?.adres||'')+'</div><div class="qt-party-info">'+(doc.klant?.gemeente||'')+'</div>'+(doc.klant?.btwnr?'<div style="font-family:JetBrains Mono,monospace;font-size:10.5px;color:#64748b">'+fmtBtwnr(doc.klant.btwnr)+'</div>':'')+'</div></div>'+
  
  gl.map(function(g){return '<div class="grp-hdr" style="background:'+dc+'">'+g.naam+'</div><table class="qt-tbl"><thead><tr><th>Omschrijving</th><th>Eenh.</th><th class="c">Aantal</th><th class="r">Prijs excl.</th><th class="r">BTW</th><th class="r">Totaal</th></tr></thead><tbody>'+g.items.map(function(l){
    if(!l.productId&&l.prijs===0&&l.naam)return '<tr style="background:#f8fafc"><td colspan="6" style="padding:6px 10px;font-size:12px;color:#475569;font-style:italic">ℹ️ '+l.naam+(l.omschr?' — '+l.omschr:'')+'</td></tr>';
    return '<tr><td><div class="qt-item-main">'+(l.naam||'')+'</div>'+(l.omschr?'<div class="qt-item-sub">'+l.omschr+'</div>':'')+'</td><td>'+(l.eenheid||'stuk')+'</td><td class="c">'+(l.aantal||1)+'</td><td class="r">'+fmtEuro(l.prijs||0)+'</td><td class="r">'+(l.btw||0)+'%</td><td class="r"><strong>'+fmtEuro((l.prijs||0)*(l.aantal||1))+'</strong></td></tr>';
  }).join('')+'</tbody></table><div class="grp-sub"><span>Subtotaal '+g.naam+':</span><strong>'+fmtEuro(g.items.reduce(function(s,l){return s+(l.prijs||0)*(l.aantal||1)},0))+'</strong></div>';}).join('')+
  
  '<div style="display:flex;justify-content:flex-end;margin-top:8px"><div class="qt-tot-box"><div class="qt-tot-row"><span>Subtotaal excl. BTW</span><span>'+fmtEuro(sub)+'</span></div>'+Object.entries(bg).map(function(e){return '<div class="qt-tot-row"><span>BTW '+e[0]+'%</span><span>'+fmtEuro(e[1])+'</span></div>';}).join('')+'<div class="qt-tot-row last" style="background:'+dc+';color:#fff"><span>TOTAAL incl. BTW</span><span>'+fmtEuro(tot)+'</span></div></div></div>'+
  '<div style="margin-top:20px;font-size:12px;color:#64748b"><strong>Betaling:</strong> IBAN '+(bed.iban||'')+' · BIC '+(bed.bic||'')+' · Mededeling: '+(doc.nummer||'')+'</div>'+
  (doc.voorschot&&doc.voorschot!=='Geen voorschot'?'<div style="margin-top:8px;padding:10px 14px;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;font-size:12px;color:#92400e">💡 <strong>Voorschot:</strong> '+doc.voorschot+' te betalen vóór aanvang van de werken.</div>':'')+
  (doc.notities?'<div style="margin-top:8px;padding:10px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;color:#475569"><strong>Opmerking:</strong> '+doc.notities+'</div>':'')+
  '<div style="margin-top:28px;border:2px dashed #e2e8f0;border-radius:8px;padding:20px;text-align:center"><div style="font-size:13px;color:#64748b">'+(sj.handtekeningTekst||'Akkoord klant — datum, handtekening & naam')+'</div><div style="height:60px"></div></div>'+
  '</div><div class="doc-footer" style="background:'+dc+'"><strong>'+(bed.naam||'')+'</strong> · '+(bed.adres||'')+', '+(bed.gemeente||'')+' · BTW: '+fmtBtwnr(bed.btwnr||'')+' · IBAN: '+(bed.iban||'')+'</div></div>'+
  
  (up.length>0?'<div class="doc-page-lbl">Productinformatie</div><div class="doc-page"><div style="height:5px;background:'+dc+'"></div><div class="prod-page"><div style="font-weight:900;font-size:18px;color:'+dc+';margin-bottom:16px">Productinformatie & Technische Fiches</div>'+up.map(function(l){return '<div class="prod-item">'+(l.imageUrl?'<img class="prod-img" src="'+l.imageUrl+'" alt="" onerror="this.style.display=\'none\'"/>':'')+'<div style="flex:1"><div class="prod-name">'+(l.naam||'')+'</div>'+(l.omschr?'<div class="prod-desc">'+l.omschr+'</div>':'')+((l.specs||[]).length?'<div style="margin-top:6px">'+l.specs.map(function(s){return '<span class="spec-tag">✓ '+s+'</span>';}).join('')+'</div>':'')+((l.technischeFiches||[]).length?'<div style="margin-top:8px">'+l.technischeFiches.map(function(f){return '<a href="'+(f.data||f.url||'#')+'" download="'+(f.naam||'fiche.pdf')+'" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;color:#2563eb;text-decoration:none;font-weight:600;font-size:12px;margin:3px 3px 0 0">📎 '+(f.naam||'Technische fiche')+'</a>';}).join('')+'</div>':'')+(l.technischeFiche&&!(l.technischeFiches||[]).length?'<div style="margin-top:8px"><a href="'+l.technischeFiche+'" download="'+(l.fichNaam||'fiche.pdf')+'" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;color:#2563eb;text-decoration:none;font-weight:600;font-size:12px">📎 '+(l.fichNaam||'Technische fiche')+'</a></div>':'')+'</div><div class="prod-price-box"><div style="font-size:10px;color:#94a3b8;font-weight:600">EENHEIDSPRIJS</div><div style="font-weight:800;font-size:16px;color:'+dc+'">'+fmtEuro(l.prijs||0)+'</div><div style="font-size:10px;color:#94a3b8">BTW '+(l.btw||0)+'%</div></div></div>';}).join('')+'</div></div>':'')+
  
  (vw?'<div class="doc-page-lbl">Voorwaarden</div><div class="doc-page"><div style="height:5px;background:'+dc+'"></div><div class="voorw-page"><div style="font-weight:800;font-size:16px;color:'+dc+';margin-bottom:12px">Algemene Voorwaarden</div>'+vw+'</div><div class="doc-footer" style="background:'+dc+'"><strong>'+(bed.naam||'')+'</strong> · '+(bed.adres||'')+', '+(bed.gemeente||'')+'</div></div>':'')+
  '</div>'+
  
  '<div class="modal-bg" id="acceptModal"><div class="modal"><h2 style="margin-bottom:20px;color:#10b981">✅ Offerte goedkeuren</h2><p style="margin-bottom:20px;color:#64748b">Bevestig uw akkoord met offerte <strong>'+doc.nummer+'</strong> voor <strong>'+fmtEuro(tot)+'</strong>.</p><div class="fg"><label class="fl">Gewenste installatieperiode</label><select class="fc" id="acceptPeriode"><option value="">— Kies —</option><option>Zo snel mogelijk</option><option>Binnen 2 weken</option><option>Binnen 1 maand</option><option>Binnen 2 maanden</option><option>Na overleg</option></select></div><div class="fg"><label class="fl">Opmerkingen</label><textarea class="fc" id="acceptNotes" rows="3" placeholder="Bijv: voorkeur ochtend..."></textarea></div><div style="display:flex;gap:10px;margin-top:20px"><button class="fab-btn fab-reject" style="flex:1;font-size:14px;padding:12px" onclick="closeModals()">Annuleren</button><button class="fab-btn fab-accept" style="flex:1;font-size:14px;padding:12px" onclick="doAccept()">✅ Bevestig</button></div></div></div>'+
  '<div class="modal-bg" id="rejectModal"><div class="modal"><h2 style="margin-bottom:20px;color:#ef4444">❌ Offerte afwijzen</h2><div class="fg"><label class="fl">Reden (optioneel)</label><textarea class="fc" id="rejectReason" rows="3" placeholder="Bijv: prijs te hoog..."></textarea></div><div style="display:flex;gap:10px;margin-top:20px"><button class="fab-btn" style="flex:1;background:#f1f5f9;color:#64748b;font-size:14px;padding:12px" onclick="closeModals()">Annuleren</button><button class="fab-btn" style="flex:1;background:#ef4444;color:#fff;font-size:14px;padding:12px" onclick="doReject()">❌ Afwijzen</button></div></div></div>';
}

window.showAcceptModal=function(){document.getElementById('acceptModal').classList.add('active')};
window.showRejectModal=function(){document.getElementById('rejectModal').classList.add('active')};
window.closeModals=function(){document.querySelectorAll('.modal-bg').forEach(function(m){m.classList.remove('active')})};
window.doAccept=function(){submitResponse(window._offId,'goedgekeurd',{periode:document.getElementById('acceptPeriode')?.value||'',opmerkingen:document.getElementById('acceptNotes')?.value||''})};
window.doReject=function(){submitResponse(window._offId,'afgewezen',{opmerkingen:document.getElementById('rejectReason')?.value||''})};

async function loadOfferte(){
  if(offId){
    try{
      var s=window.supabase.createClient(SB_URL,SB_KEY);
      var r=await s.from('offerte_shares').select('offerte_data').eq('id',offId).single();
      console.log('📊 Supabase response:',r.error?r.error:'OK',r.data?'data found':'no data');
      if(r.data&&r.data.offerte_data){
        console.log('✅ Offerte loaded, lijnen:',r.data.offerte_data.lijnen?.length);
        renderOfferte(r.data.offerte_data);return;
      }
    }catch(e){console.error('Load error:',e)}
    document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">⏳</div><h2>Offerte niet gevonden</h2><p>De offerte moet opnieuw verstuurd worden.<br><small style="color:#94a3b8">ID: '+offId+'</small></p></div>';return;
  }
  if(offerteData){try{renderOfferte(JSON.parse(decodeURIComponent(atob(offerteData))));return;}catch(e){}}
  document.getElementById('app').innerHTML='<div class="status-msg"><div class="icon">📋</div><h2>Geen offerte</h2><p>Gebruik de link uit uw email.</p></div>';
}
loadOfferte();
</script>
</body>
