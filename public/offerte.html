<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offerte laden...</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Arial,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
#loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px}
.spin{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#1a2e4a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#err{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:24px;text-align:center}
#err h2{color:#ef4444;font-size:20px;font-weight:800}
#err p{color:#64748b;font-size:14px;max-width:420px;line-height:1.6}
.retry-btn{background:#1a2e4a;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}

/* Wrapper */
#app{display:none;max-width:860px;margin:0 auto;padding:24px 16px 80px}
.doc-page{background:#fff;max-width:860px;width:100%;margin:0 auto 20px;box-shadow:0 2px 12px rgba(0,0,0,.1);border-radius:4px;overflow:visible}
.doc-page-lbl{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:5px;margin-top:16px}

/* Voorblad (page 1) */
.cov{display:grid;grid-template-columns:42% 58%;min-height:480px}
.cov-l{display:flex;flex-direction:column;padding:44px 32px;position:relative;overflow:hidden}
.cov-logo{max-width:140px;max-height:52px;object-fit:contain;margin-bottom:14px;filter:brightness(0) invert(1)}
.cov-logo-mark{width:52px;height:52px;border-radius:10px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px}
.cov-co-name{font-weight:900;font-size:21px;color:#fff;letter-spacing:-.5px;margin-bottom:3px}
.cov-co-tag{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:auto}
.cov-contact{margin-top:auto;font-size:11px;color:rgba(255,255,255,.5);line-height:1.9}
.cov-contact strong{color:rgba(255,255,255,.8)}
.cov-r{padding:44px 40px;display:flex;flex-direction:column;justify-content:space-between}
.cov-doctype{font-weight:900;font-size:52px;letter-spacing:-2.5px;line-height:1;color:#1e293b}
.cov-docnum{font-family:monospace;font-size:12.5px;background:#f0f4f8;padding:3px 10px;border-radius:5px;display:inline-block;margin-top:5px;margin-bottom:28px;font-weight:700}
.cov-for-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:7px}
.cov-client-name{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:3px}
.cov-client-co{font-size:14px;color:#475569;font-weight:600;margin-bottom:3px}
.cov-client-addr{font-size:12.5px;color:#64748b;line-height:1.7}
.cov-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:28px;padding-top:18px;border-top:2px solid #f0f4f8}
.cov-meta-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#94a3b8;margin-bottom:2px}
.cov-meta-val{font-size:13px;font-weight:700;color:#1e293b}
.cov-total{font-size:22px;font-weight:900;letter-spacing:-.5px}

/* Offerte detail (page 3 style) */
.qt-pg{padding:30px 40px}
.qt-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;padding-bottom:18px;border-bottom:2px solid #f0f4f8}
.qt-from-logo{max-height:40px;max-width:120px;object-fit:contain;margin-bottom:6px}
.qt-from-name{font-weight:900;font-size:18px;letter-spacing:-.4px;margin-bottom:2px}
.qt-from-info{font-size:10.5px;color:#64748b;line-height:1.9}
.qt-dtype{font-weight:900;font-size:28px;letter-spacing:-.8px;text-align:right}
.qt-dnum{font-family:monospace;font-size:11.5px;background:#f0f4f8;padding:2px 8px;border-radius:4px;display:inline-block;margin-top:4px}
.qt-meta-bar{display:flex;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden;margin-bottom:18px}
.qt-meta-item{flex:1;padding:9px 14px;border-right:1px solid #e2e8f0}
.qt-meta-item:last-child{border-right:none}
.qt-meta-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:1px}
.qt-meta-val{font-size:12.5px;font-weight:700}
.qt-parties{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:20px}
.qt-party-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:6px}
.qt-party-name{font-weight:700;font-size:13px;margin-bottom:2px}
.qt-party-info{font-size:11.5px;color:#475569;line-height:1.8}
.grp-hdr{padding:7px 12px;border-radius:4px 4px 0 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#fff;margin-top:12px}
.qt-tbl{width:100%;border-collapse:collapse;border:1px solid #e2e8f0;border-top:none}
.qt-tbl th{background:#f8fafc;padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0}
.qt-tbl th.r,.qt-tbl td.r{text-align:right}
.qt-tbl th.c,.qt-tbl td.c{text-align:center}
.qt-tbl tbody tr:nth-child(even){background:#fafbfc}
.qt-tbl td{padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:11.5px}
.qt-tbl tbody tr:last-child td{border-bottom:none}
.qt-item-main{font-weight:600}
.qt-item-sub{font-size:10.5px;color:#64748b;margin-top:1px}
.grp-sub{display:flex;justify-content:space-between;padding:7px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-top:none;font-size:11.5px;color:#475569}
.qt-totals{display:flex;justify-content:flex-end;margin-top:18px}
.qt-tot-box{min-width:260px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.qt-tot-row{display:flex;justify-content:space-between;padding:7px 14px;font-size:12.5px;border-bottom:1px solid #f1f5f9}
.qt-tot-row.last{border-bottom:none;font-weight:800;font-size:15px;padding:10px 14px}
.qt-tot-row.btwr{color:#64748b;font-size:11.5px}
.qt-betaal{margin-top:14px;padding:11px 13px;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;font-size:12px;line-height:1.8}
.qt-notes{margin-top:10px;padding:11px 13px;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;font-size:12px;color:#78350f}
.qt-footer{padding:10px 40px;display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.qt-footer-txt{font-size:10px;color:rgba(255,255,255,.5)}
.legal-txt{font-size:11px;line-height:1.6;color:#475569;white-space:pre-wrap}

/* Technische fiches */
.fiche-sectie{margin-top:8px}
.fiche-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:16px}
.fiche-hdr{padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.fiche-hdr-naam{font-weight:700;font-size:13px}
.fiche-hdr-prod{font-size:11px;color:#64748b}
.fiche-embed{width:100%;border:none;display:block;min-height:700px;background:#f8fafc}

/* Bevestigingsblok */
.bblok{border:2px solid var(--dc,#1a2e4a);border-radius:10px;padding:24px;margin-top:24px;text-align:center;background:#fff}
.bblok h3{font-size:17px;font-weight:800;margin-bottom:8px}
.bblok p{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6}
.btn-ok{background:var(--dc,#1a2e4a);color:#fff;border:none;padding:13px 36px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin:5px;display:inline-block}
.btn-nok{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;padding:11px 26px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin:5px}
.ok-banner{background:#d1fae5;border:2px solid #10b981;border-radius:10px;padding:18px 24px;text-align:center;margin-top:24px}
.ok-banner h3{color:#065f46;font-weight:800;font-size:18px}
.nok-banner{background:#fef2f2;border:2px solid #ef4444;border-radius:10px;padding:18px 24px;text-align:center;margin-top:24px}
.pform{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin-top:14px;text-align:left}
.pform label{font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:4px}
.pform input,.pform textarea{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;margin-bottom:10px}
.pform textarea{resize:vertical;min-height:70px}

@media(max-width:600px){
  .cov{grid-template-columns:1fr}
  .cov-l{padding:28px 20px}
  .cov-r{padding:24px 20px}
  .qt-pg{padding:20px 16px}
  .qt-parties{grid-template-columns:1fr;gap:12px}
  .qt-meta-bar{flex-wrap:wrap}
  .qt-meta-item{min-width:50%}
  .qt-tbl{font-size:10.5px}
  .qt-footer{padding:10px 16px;flex-direction:column;gap:2px;text-align:center}
}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><div style="font-size:14px;font-weight:600;color:#64748b">Offerte laden...</div></div>
<div id="err"><h2>Offerte niet beschikbaar</h2><p id="errmsg">Deze offerte kon niet worden geladen.</p><button class="retry-btn" onclick="location.reload()">Opnieuw proberen</button></div>
<div id="app"></div>
<script>
var SB="https://qxnxbqkdvvblfkihmjxy.supabase.co";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bnhicWtkdnZibGZraWhtanh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTI3MTMsImV4cCI6MjA4ODkyODcxM30.1JDvrHgxLpU1GZqSjDVGtfnFJg8PHuD-aFpHOxAY1To";
var params=new URLSearchParams(location.search);
var OID=params.get("id");
var ONR=params.get("nr");
var alleFiches=[];

function fmtE(n){return"\u20AC\u00A0"+Number(n||0).toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");}
function fmtD(d){if(!d)return"\u2014";try{return new Date(d).toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit",year:"numeric"});}catch(_){return d;}}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function h(){return{"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json"};}
async function sbGet(p){var r=await fetch(SB+p,{headers:h()});if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}
async function sbPost(p,b){var r=await fetch(SB+p,{method:"POST",headers:Object.assign({"Prefer":"return=minimal"},h()),body:JSON.stringify(b)});return r.ok||r.status===201;}
function showErr(m){document.getElementById("loader").style.display="none";document.getElementById("err").style.display="flex";if(m)document.getElementById("errmsg").textContent=m;}

async function load(){
  if(!OID){showErr("Geen offerte-ID in de URL.");return;}
  var data=null;
  for(var i=1;i<=3;i++){
    try{
      var rows=await sbGet("/rest/v1/offerte_shares?id=eq."+encodeURIComponent(OID)+"&select=offerte_data,nummer");
      if(rows&&rows.length>0&&rows[0].offerte_data){data=rows[0].offerte_data;break;}
    }catch(e){console.warn("Poging "+i+":",e.message);}
    if(i<3)await new Promise(function(r){setTimeout(r,2000);});
  }
  if(!data){showErr("Offerte '"+esc(ONR||OID)+"' niet gevonden. Neem contact op met W-Charge BV.");return;}
  // Technische fiches laden
  try{
    var fr=await sbGet("/rest/v1/offerte_fiches?offerte_id=eq."+encodeURIComponent(OID)+"&select=product_id,fiches");
    if(fr&&fr.length>0){
      (data.lijnen||[]).forEach(function(l){
        var pid=l.productId||l.id;
        var row=fr.find(function(r){return r.product_id===pid;});
        var fiches=(row&&row.fiches)||[];
        fiches.filter(function(f){return f.data&&f.data.length>100;}).forEach(function(f){
          alleFiches.push({productNaam:l.naam||"",naam:f.naam||"fiche.pdf",data:f.data,type:f.type||"application/pdf"});
        });
      });
    }
  }catch(e){console.warn("Fiches:",e.message);}
  render(data);
  try{sbPost("/rest/v1/offerte_views",{offerte_id:OID,user_agent:navigator.userAgent,viewed_at:new Date().toISOString()});}catch(_){}
}

function calcTot(lijnen){
  var sub=0,bm={};
  (lijnen||[]).forEach(function(l){
    if(l.type==="informatief"||(!l.prijs&&l.prijs!==0))return;
    var lp=(l.prijs||0)*(l.aantal||1);sub+=lp;
    var r=l.btw||0;bm[r]=(bm[r]||0)+lp*r/100;
  });
  var tb=Object.values(bm).reduce(function(a,b){return a+b;},0);
  return{sub:sub,bm:bm,tot:sub+tb};
}

function render(d){
  var bed=d._bed||{};
  var dc=d._dc||"#1a2e4a";
  var sj=d._sj||{};
  var tot=calcTot(d.lijnen||[]);
  var isOK=d.status==="goedgekeurd"||d.klantAkkoord;
  var isNOK=d.status==="afgewezen";
  document.title="Offerte "+esc(d.nummer||"")+" \u2014 "+esc(bed.naam||"");
  document.documentElement.style.setProperty("--dc",dc);

  // Groepen + lijnen
  var groepen=d.groepen||[];
  var lijnen=d.lijnen||[];
  function getLijnenPerGroep(){
    var result=[];
    var usedGroepen=groepen.filter(function(g){return lijnen.some(function(l){return l.groepId===g.id;});});
    usedGroepen.forEach(function(g){result.push({id:g.id,naam:g.naam,items:lijnen.filter(function(l){return l.groepId===g.id;})});});
    var rest=lijnen.filter(function(l){return !groepen.find(function(g){return g.id===l.groepId;});});
    if(rest.length>0)result.push({id:"rest",naam:"Producten",items:rest});
    return result;
  }
  var lpg=getLijnenPerGroep();
  if(lpg.length===0)lpg=[{id:"rest",naam:"Producten",items:lijnen}];

  function renderGroepen(){
    var html="";
    lpg.forEach(function(g){
      var hasNaam=g.id!=="rest"||lpg.length>1;
      if(hasNaam)html+="<div class='grp-hdr' style='background:"+dc+"'>"+esc(g.naam)+"</div>";
      html+="<table class='qt-tbl'><thead><tr><th>Omschrijving</th><th>Eenh.</th><th class='c'>Aantal</th><th class='r'>Prijs excl.</th><th class='r'>BTW</th><th class='r'>Totaal</th></tr></thead><tbody>";
      g.items.forEach(function(l){
        if(l.type==="informatief"){
          html+="<tr style='background:#f8fafc'><td colspan='6' style='padding:6px 10px;font-size:12px;color:#475569;font-style:italic;border-bottom:1px solid #e2e8f0'><span style='font-weight:600;color:#64748b'>&#x2139;&#xFE0F; "+esc(l.naam)+"</span>"+(l.omschr?"<span style='margin-left:6px;color:#94a3b8'> \u2014 "+esc(l.omschr)+"</span>":"")+"</td></tr>";
          return;
        }
        var sub=(l.prijs||0)*(l.aantal||1);
        var neg=l.prijs<0;
        html+="<tr"+(neg?" style='color:#ef4444;font-style:italic'":"")+">"
          +"<td><div class='qt-item-main'>"+esc(l.naam||"")+"</div>"+(l.omschr?"<div class='qt-item-sub'>"+esc(l.omschr)+"</div>":"")+"</td>"
          +"<td>"+esc(l.eenheid||"stuk")+"</td>"
          +"<td class='c'>"+esc(l.aantal||1)+"</td>"
          +"<td class='r'>"+fmtE(l.prijs||0)+"</td>"
          +"<td class='r'>"+esc(l.btw||0)+"%</td>"
          +"<td class='r'><strong>"+fmtE(sub)+"</strong></td>"
          +"</tr>";
      });
      html+="</tbody></table>";
      var gsub=g.items.filter(function(l){return l.type!=="informatief";}).reduce(function(s,l){return s+(l.prijs||0)*(l.aantal||1);},0);
      if(hasNaam)html+="<div class='grp-sub'><span>Subtotaal "+esc(g.naam)+":</span><strong>"+fmtE(gsub)+"</strong></div>";
    });
    return html;
  }

  // BTW rijen
  var btwH="";
  Object.keys(tot.bm).sort().forEach(function(pct){
    if(tot.bm[pct]>0.01)btwH+="<div class='qt-tot-row btwr'><span>BTW "+pct+"%</span><span>"+fmtE(tot.bm[pct])+"</span></div>";
  });

  // Voorschot
  var vsH="";
  var vs=d.voorschot||d._voorschot||"";
  if(vs&&vs!=="Geen voorschot"){var vsp=parseFloat(vs);if(!isNaN(vsp)&&vsp>0)vsH="<div class='qt-notes'>&#x1F4A1; <strong>Voorschot:</strong> "+esc(vs)+" te betalen v\xF3\xF3r aanvang van de werken.</div>";}

  // Technische fiches sectie
  var fichesH="";
  if(alleFiches.length>0){
    fichesH="<div class='doc-page-lbl'>Technische Fiches</div><div class='doc-page'><div style='height:5px;background:"+dc+"'></div><div style='padding:24px 30px'><div style='font-weight:800;font-size:16px;color:"+dc+";margin-bottom:16px'>&#x1F4CE; Technische Fiches</div>";
    alleFiches.forEach(function(f){
      var b64=f.data;
      if(b64&&b64.indexOf("base64,")>-1)b64=b64.split("base64,")[1];
      var dataUri="data:"+f.type+";base64,"+b64;
      fichesH+="<div class='fiche-card'>"
        +"<div class='fiche-hdr'><span style='font-size:18px'>&#x1F4C4;</span><div><div class='fiche-hdr-naam'>"+esc(f.naam)+"</div><div class='fiche-hdr-prod'>"+esc(f.productNaam)+"</div></div></div>"
        +"<embed class='fiche-embed' src='"+dataUri+"' type='application/pdf'/>"
        +"</div>";
    });
    fichesH+="</div><div class='qt-footer' style='background:"+dc+"'><span class='qt-footer-txt'><strong>"+esc(bed.naam||"")+"</strong></span><span class='qt-footer-txt'>"+esc(bed.tel||"")+" \xB7 "+esc(bed.email||"")+"</span></div></div>";
  }

  // Bevestigingsblok
  var bH="";
  if(sj.toonBevestigingslink!==false){
    if(isOK)bH="<div class='ok-banner'><h3>\u2705 Offerte goedgekeurd</h3><p style='color:#059669;font-size:13px;margin-top:4px'>Bedankt voor uw bevestiging. We nemen spoedig contact op.</p></div>";
    else if(isNOK)bH="<div class='nok-banner'><h3>Offerte afgewezen</h3><p style='font-size:13px;color:#991b1b;margin-top:4px'>Bedankt voor uw reactie. Neem contact op met vragen.</p></div>";
    else bH="<div class='bblok'><h3>Uw reactie</h3><p>Gaat u akkoord met deze offerte?</p>"
      +"<div id='actieblok'><button class='btn-ok' onclick='showPform()'>\u2705 Akkoord</button><button class='btn-nok' onclick='doAfwijzen()'>Niet akkoord</button></div>"
      +"<div id='pform' class='pform' style='display:none'><p style='font-size:13px;color:#475569;margin-bottom:14px'>Optioneel: voorkeursdatum voor de installatie</p>"
      +"<label>Gewenste datum (optioneel)</label><input type='date' id='pdatum'/>"
      +"<label>Opmerkingen (optioneel)</label><textarea id='pnotitie' placeholder='Bijv. speciale instructies...'></textarea>"
      +"<button class='btn-ok' style='width:100%;margin:0' onclick='doAkkoord()'>\u2705 Bevestigen</button></div></div>";
  }

  // Logo
  var logoH=bed.logo?"<img class='qt-from-logo' src='"+esc(bed.logo)+"' alt='"+esc(bed.naam||"")+"' onerror='this.style.display=`none`'/>":"";

  // Voorwaarden
  var vwH=d._voorwaarden?"<div class='doc-page-lbl'>Pagina — Algemene Voorwaarden</div><div class='doc-page'><div style='height:5px;background:"+dc+"'></div><div style='padding:30px 40px;flex:1'><div style='font-weight:900;font-size:18px;color:"+dc+";margin-bottom:16px'>Algemene Verkoopsvoorwaarden &amp; Verklaringen</div><div class='legal-txt'>"+esc(d._voorwaarden)+"</div></div><div class='qt-footer' style='background:"+dc+"'><span class='qt-footer-txt'><strong>"+esc(bed.naam||"")+"</strong> &middot; "+esc(bed.adres||"")+"</span><span class='qt-footer-txt'>BTW: "+esc(bed.btwnr||"")+"</span></div></div>":"";

  var html=
    // PAGE 1: VOORBLAD
    "<div class='doc-page-lbl'>Voorblad</div>"
    +"<div class='doc-page'>"
    +"<div class='cov'>"
    +"<div class='cov-l' style='background:"+dc+"'>"
    +(bed.logo?"<img class='cov-logo' src='"+esc(bed.logo)+"' alt='' onerror='this.style.display=`none`'/>"
             :"<div class='cov-logo-mark'>\u26A1</div>")
    +"<div class='cov-co-name'>"+esc(bed.naam||"")+"</div>"

    +(bed.tel?"<div><strong>"+esc(bed.tel)+"</strong></div>":"")

    +"</div></div>"
    +"<div class='cov-r'>"
    +"<div>"
    +"<div class='cov-doctype' style='color:"+dc+"'>OFFERTE</div>"
    +"<div class='cov-docnum'>"+esc(d.nummer||"")+"</div>"
    +"<div class='cov-for-lbl'>Offerte voor</div>"
    +"<div class='cov-client-name'>"+esc((d.klant&&d.klant.naam)||"")+"</div>"
    +(d.klant&&d.klant.bedrijf?"<div class='cov-client-co'>"+esc(d.klant.bedrijf)+"</div>":"")
    +"<div class='cov-client-addr'>"
    +(d.klant&&d.klant.adres?"<div>"+esc(d.klant.adres)+"</div>":"")

    +(d.klant&&d.klant.btwnr?"<div>"+esc(d.klant.btwnr)+"</div>":"")

    +"<div class='cov-meta'>"

    +"<div><div class='cov-meta-lbl'>Geldig tot</div><div class='cov-meta-val'>"+fmtD(d.vervaldatum)+"</div></div>"

    +"</div></div></div></div>"

    // PAGE 2 (DETAIL)
    +"<div class='doc-page-lbl'>Offertedetail</div>"

    +"<div class='qt-header'>"

    +(logoH?"":"<div class='qt-from-name' style='color:"+dc+"'>\u26A1 "+esc(bed.naam||"")+"</div>")

    +"</div>"

    +"</div>"

    +"<div><div class='qt-party-name' style='color:"+dc+"'>"+esc(bed.naam||"")+"</div>"

    +(bed.iban?"<div class='qt-betaal'><strong>Betaling:</strong> IBAN "+esc(bed.iban)+(bed.bic?" &middot; BIC "+esc(bed.bic):"")+" &middot; Mededeling: "+esc(d.nummer||"")+"</div>":"")

    // BEVESTIGING
    +(bH?"<div style='padding:0 8px'>"+bH+"</div>":"");

  document.getElementById("app").innerHTML=html;
  document.getElementById("app").style.display="block";
  document.getElementById("loader").style.display="none";
}

function showPform(){document.getElementById("pform").style.display="block";document.getElementById("actieblok").style.display="none";}
async function doAkkoord(){
  var datum=document.getElementById("pdatum").value||"";
  var notitie=document.getElementById("pnotitie").value||"";
  try{
    await sbPost("/rest/v1/offerte_responses",{offerte_id:OID,status:"goedgekeurd",periode:datum||null,opmerkingen:notitie||null,submitted_at:new Date().toISOString()});
    document.querySelector(".bblok").outerHTML="<div class='ok-banner'><h3>\u2705 Offerte goedgekeurd!</h3><p style='color:#059669;font-size:13px;margin-top:4px'>Bedankt"+(datum?" \u2014 voorkeursdatum: "+datum:"")+". We nemen spoedig contact op.</p></div>";
  }catch(e){alert("Er ging iets mis. Probeer opnieuw of neem contact op.");}
}
async function doAfwijzen(){
  if(!confirm("Bent u zeker dat u deze offerte wilt afwijzen?"))return;
  try{
    await sbPost("/rest/v1/offerte_responses",{offerte_id:OID,status:"afgewezen",submitted_at:new Date().toISOString()});
    document.querySelector(".bblok").outerHTML="<div class='nok-banner'><h3>Offerte afgewezen</h3><p style='font-size:13px;color:#991b1b;margin-top:4px'>Bedankt voor uw reactie.</p></div>";
  }catch(e){alert("Er ging iets mis.");}
}
load();
</script>
