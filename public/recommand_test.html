async function testXML() {
  const key = document.getElementById('key').value.trim();
  const secret = document.getElementById('secret').value.trim();
  const company = document.getElementById('company').value.trim();
  
  if(!key || !secret) { alert('Vul key en secret in!'); return; }
  
  const auth = 'Basic ' + btoa(key + ':' + secret);
  document.getElementById('auth').textContent = 'Authorization: ' + auth.substring(0, 30) + '... (key=' + key.substring(0,20) + '...)';
  document.getElementById('result').textContent = 'Bezig...';
  
  try {
    const resp = await fetch('/api/recommand?path=%2F' + encodeURIComponent(company) + '%2Fsend', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': auth
      },
      body: JSON.stringify({
        recipient: '0208:1007676679',
        documentType: 'xml',
        document: XML
      })
    });
    
    const data = await resp.json();
    const pre = document.getElementById('result');
    if(data.success) {
      pre.className = 'ok';
      pre.textContent = '✅ SUCCES! ' + JSON.stringify(data, null, 2);
    } else {
      pre.className = 'err';
      pre.textContent = '❌ FOUT HTTP ' + resp.status + ':\n' + JSON.stringify(data, null, 2);
    }
  } catch(e) {
    document.getElementById('result').textContent = 'Error: ' + e.message;
  }
}
