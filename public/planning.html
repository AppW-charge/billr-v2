<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Installatieafspraak bevestigen</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,Arial,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.spin{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#1a2e4a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
#loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;font-size:15px;color:#64748b}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><div>Afspraak laden...</div></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SB_URL = 'https://qxnxbqkdvvblfkihmjxy.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bnhicWtkdnZibGZraWhtanh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDg4NzMxNzQsImV4cCI6MjAyNDQ0OTE3NH0.lsf7dJQL5tMKcGCBkxZ7OGJQ0a1n_kkWIiVU3Eym4k4';

async function sbGet(table, filter) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
    headers: {'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json'}
  });
  return r.json();
}
async function sbPost(table, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
    body: JSON.stringify(body)
  });
  return r.ok;
}
async function sbPatch(table, filter, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${filter}`, {
    method: 'PATCH',
    headers: {'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
    body: JSON.stringify(body)
  });
  return r.ok;
}

function fmtDate(d) {
  if(!d) return '-';
  try { return new Date(d+'T12:00:00').toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
  catch(_){ return d; }
}

function App() {
  const [data, setData] = useState(null);
  const [fase, setFase] = useState('laden'); // laden | bevestigen | alternatief | bevestigd | afgewezen | error
  const [altDatum, setAltDatum] = useState('');
  const [altTijd, setAltTijd] = useState('');
  const [altOpmerking, setAltOpmerking] = useState('');
  const [error, setError] = useState('');

  const params = new URLSearchParams(location.search);
  const proposalId = params.get('id');

  useEffect(() => {
    if(!proposalId) { setFase('error'); setError('Geen afspraak-ID gevonden.'); return; }
    (async () => {
      try {
        const rows = await sbGet('planning_proposals', `id=eq.${proposalId}&select=*`);
        if(!rows || !rows[0]) { setFase('error'); setError('Afspraak niet gevonden.'); return; }
        const row = rows[0];
        if(row.status === 'bevestigd') { setFase('bevestigd'); setData(row.plan_data); return; }
        if(row.status === 'alternatief') { setFase('alternatief_gewacht'); setData(row.plan_data); return; }
        setData(row.plan_data);
        document.getElementById('loader').style.display = 'none';
        setFase('keuze');
      } catch(e) {
        setFase('error'); setError('Technische fout: ' + e.message);
      }
      document.getElementById('loader').style.display = 'none';
    })();
  }, []);

  const dc = data?._dc || '#1a2e4a';

  const doBevestig = async () => {
    setFase('bezig');
    const ok = await sbPatch('planning_proposals', `id=eq.${proposalId}`, {status: 'bevestigd', updated_at: new Date().toISOString()});
    if(ok) setFase('bevestigd');
    else { setFase('keuze'); setError('Bevestiging mislukt, probeer opnieuw.'); }
  };

  const doAlternatief = async () => {
    if(!altDatum) { setError('Kies een datum.'); return; }
    setFase('bezig');
    const ok = await sbPatch('planning_proposals', `id=eq.${proposalId}`, {
      status: 'alternatief',
      alternatief: { datum: altDatum, tijd: altTijd, opmerking: altOpmerking },
      updated_at: new Date().toISOString()
    });
    if(ok) setFase('alternatief_ok');
    else { setFase('alternatief'); setError('Versturen mislukt, probeer opnieuw.'); }
  };

  if(fase === 'error') return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:24,textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16}}>😕</div>
      <h2 style={{color:'#ef4444',marginBottom:8}}>Afspraak niet gevonden</h2>
      <p style={{color:'#64748b',maxWidth:400}}>{error || 'Deze link is ongeldig of verlopen.'}</p>
    </div>
  );

  if(!data || fase === 'laden') return null;

  const card = (children) => (
    <div style={{minHeight:'100vh',background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{maxWidth:520,width:'100%',background:'#fff',borderRadius:16,boxShadow:'0 4px 24px rgba(0,0,0,.1)',overflow:'hidden'}}>
        <div style={{background:dc,padding:'28px 32px',textAlign:'center'}}>
          <div style={{fontSize:36,marginBottom:8}}>📅</div>
          <h1 style={{color:'#fff',fontSize:22,fontWeight:900,margin:0}}>{data._bed?.naam || 'W-charge BV'}</h1>
          <p style={{color:'rgba(255,255,255,.8)',fontSize:13,marginTop:4}}>Installatieafspraak · {data.offerteNummer}</p>
        </div>
        <div style={{padding:'28px 32px'}}>
          {children}
        </div>
      </div>
    </div>
  );

  if(fase === 'bevestigd') return card(
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:16}}>✅</div>
      <h2 style={{color:'#059669',fontSize:22,fontWeight:800,marginBottom:8}}>Afspraak bevestigd!</h2>
      <p style={{color:'#475569',marginBottom:20}}>Bedankt! We zien u op:</p>
      <div style={{background:'#f0fdf4',border:'2px solid #86efac',borderRadius:12,padding:20,marginBottom:20}}>
        <div style={{fontSize:20,fontWeight:800,color:'#166534'}}>{fmtDate(data.planDatum)}</div>
        <div style={{fontSize:16,color:'#15803d',marginTop:4}}>⏰ {data.planTijd || 'Tijdstip nog te bevestigen'}</div>
        <div style={{fontSize:13,color:'#64748b',marginTop:8}}>📍 {data.klant?.adres}, {data.klant?.gemeente}</div>
      </div>
      <p style={{color:'#64748b',fontSize:13}}>U ontvangt een bevestigingsemail. Bij vragen: <strong>{data._bed?.tel}</strong></p>
    </div>
  );

  if(fase === 'alternatief_ok') return card(
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:16}}>📨</div>
      <h2 style={{color:'#2563eb',fontSize:22,fontWeight:800,marginBottom:8}}>Voorstel ontvangen!</h2>
      <p style={{color:'#475569'}}>Uw alternatief voorstel werd doorgestuurd. We nemen zo snel mogelijk contact op.</p>
    </div>
  );

  if(fase === 'bevestigd_gewacht') return card(
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:16}}>✅</div>
      <h2 style={{color:'#059669'}}>Al bevestigd</h2>
      <p style={{color:'#475569'}}>Deze afspraak werd al eerder bevestigd op {fmtDate(data.planDatum)}.</p>
    </div>
  );

  if(fase === 'alternatief') return card(
    <div>
      <h2 style={{fontSize:18,fontWeight:800,marginBottom:4}}>Ander moment voorstellen</h2>
      <p style={{color:'#64748b',fontSize:13,marginBottom:20}}>Kies een datum die u beter past:</p>
      {error && <div style={{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:8,padding:12,marginBottom:16,color:'#dc2626',fontSize:13}}>{error}</div>}
      <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:4}}>Datum *</label>
      <input type="date" value={altDatum} onChange={e=>setAltDatum(e.target.value)} min={new Date().toISOString().split('T')[0]}
        style={{width:'100%',padding:'10px 12px',border:'2px solid #e2e8f0',borderRadius:8,fontSize:14,marginBottom:12}}/>
      <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:4}}>Voorkeur tijdstip</label>
      <input type="time" value={altTijd} onChange={e=>setAltTijd(e.target.value)}
        style={{width:'100%',padding:'10px 12px',border:'2px solid #e2e8f0',borderRadius:8,fontSize:14,marginBottom:12}}/>
      <label style={{display:'block',fontSize:13,fontWeight:600,marginBottom:4}}>Opmerking (optioneel)</label>
      <textarea value={altOpmerking} onChange={e=>setAltOpmerking(e.target.value)} rows={3}
        style={{width:'100%',padding:'10px 12px',border:'2px solid #e2e8f0',borderRadius:8,fontSize:14,resize:'vertical',marginBottom:20}}/>
      <div style={{display:'flex',gap:12}}>
        <button onClick={()=>{setFase('keuze');setError('');}} style={{flex:1,padding:'12px',border:'2px solid #e2e8f0',borderRadius:8,background:'#fff',cursor:'pointer',fontWeight:600}}>← Terug</button>
        <button onClick={doAlternatief} style={{flex:2,padding:'12px',background:dc,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:15}}>📨 Verstuur voorstel</button>
      </div>
    </div>
  );

  if(fase === 'bezig') return card(
    <div style={{textAlign:'center',padding:'40px 0'}}>
      <div className="spin" style={{borderTopColor:dc}}></div>
      <p style={{color:'#64748b',marginTop:16}}>Even geduld...</p>
    </div>
  );

  // Standaard: keuze scherm
  return card(
    <div>
      <h2 style={{fontSize:18,fontWeight:800,marginBottom:4}}>Bevestig uw installatieafspraak</h2>
      <p style={{color:'#64748b',fontSize:13,marginBottom:20}}>Beste {data.klant?.naam}, wij stellen de volgende afspraak voor:</p>
      
      <div style={{background:'linear-gradient(135deg,#eff6ff,#dbeafe)',border:'2px solid #93c5fd',borderRadius:12,padding:24,textAlign:'center',marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,color:'#3b82f6',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Voorgestelde datum</div>
        <div style={{fontSize:22,fontWeight:900,color:'#1e40af'}}>{fmtDate(data.planDatum)}</div>
        <div style={{fontSize:17,fontWeight:700,color:'#3b82f6',marginTop:4}}>⏰ {data.planTijd || 'Tijdstip nog te bepalen'}</div>
        {data.planNotities && <div style={{fontSize:13,color:'#64748b',marginTop:10,fontStyle:'italic'}}>💬 {data.planNotities}</div>}
      </div>
      
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,marginBottom:24}}>
        <tr style={{background:'#f1f5f9'}}>
          <td style={{padding:'8px 12px',border:'1px solid #e2e8f0',fontWeight:600}}>📍 Adres</td>
          <td style={{padding:'8px 12px',border:'1px solid #e2e8f0'}}>{data.klant?.adres}, {data.klant?.gemeente}</td>
        </tr>
        {data.totaal && <tr>
          <td style={{padding:'8px 12px',border:'1px solid #e2e8f0',fontWeight:600}}>💰 Totaal</td>
          <td style={{padding:'8px 12px',border:'1px solid #e2e8f0',fontWeight:700}}>{data.totaal}</td>
        </tr>}
      </table>
      
      {error && <div style={{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:8,padding:12,marginBottom:16,color:'#dc2626',fontSize:13}}>{error}</div>}
      
      <button onClick={doBevestig} style={{width:'100%',padding:'16px',background:'#059669',color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontWeight:800,fontSize:17,marginBottom:12}}>
        ✅ Akkoord — afspraak bevestigen
      </button>
      <button onClick={()=>setFase('alternatief')} style={{width:'100%',padding:'12px',background:'#f1f5f9',color:'#475569',border:'2px solid #e2e8f0',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>
        📅 Ander moment voorstellen
      </button>
      
      <p style={{textAlign:'center',fontSize:11,color:'#94a3b8',marginTop:16}}>
        {data._bed?.naam} · {data._bed?.tel} · {data._bed?.email}
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
